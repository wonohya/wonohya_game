<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>성공버스 기사 — 정원오 공약 아케이드</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fff;--surface:#f5f5f7;--border:#e5e5e5;--text:#111;--muted:#999;
    --red:#ef4444;--green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:12px;}
  #wrap{
  width:min(92vw, 760px);
  height:min(94vh, 900px);
  max-width:none;
  max-height:none;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.08);
  background:#fff;
}
/* 모바일: 풀스크린, 보더/패딩 제거 */
@media(min-width:641px){
  #queue{
    gap:10px;
    padding:0 14px 8px;
  }

  .pax{
    min-width:95px;
    max-width:135px;
    padding:9px 8px 10px;
  }

  .pax .name{
    font-size:12px !important;
  }

  .pax .dest{
    font-size:12px !important;
    line-height:1.2 !important;
    white-space:nowrap !important;
    overflow:hidden !important;
    text-overflow:ellipsis !important;
    word-break:keep-all !important;
  }

  .pax.front{
    flex:1.25 1 0;
  }
}
@media(max-width:640px){
    body{padding:0;}
    #wrap{max-width:100%;height:100dvh;max-height:100dvh;border:none;border-radius:0;box-shadow:none;}
}
  /* HUD */
  #hud{
    background:#fff;border-bottom:1.5px solid var(--border);
    padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;gap:10px;
  }
  #routeBadge{
    font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:12px;
    padding:5px 14px;border-radius:100px;color:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.18);white-space:nowrap;
    background:var(--blue);
  }
  #routeInfo{font-size:11px;display:flex;gap:4px;align-items:center;flex:1;justify-content:center;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-weight:500;}
  #routeInfo .cur{color:var(--text);font-weight:700;}
  #scoreBox{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--text);}

  /* 노선 진행 바 */
  #routeBar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
  .stop-dot{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;font-size:10px;color:var(--muted);text-align:center;min-width:0;}
  .stop-dot::before{content:'';width:11px;height:11px;border-radius:50%;background:var(--border);border:2px solid #d0d0d0;margin-bottom:3px;transition:background .3s;}
  .stop-dot.done::before{background:var(--green);border-color:var(--green);}
  .stop-dot.current::before{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 10px rgba(245,158,11,.5);animation:pulse-dot .9s infinite;}
  @keyframes pulse-dot{50%{transform:scale(1.25);}}
  .stop-dot.current{color:var(--text);font-weight:700;}
  .stop-dot .name{font-size:9px;line-height:1.2;padding:0 2px;word-break:keep-all;font-family:'Noto Sans KR',sans-serif;}
  .stop-line{flex:0 0 4px;height:2px;background:var(--border);align-self:center;margin-top:-8px;transition:background .3s;}
  .stop-line.done{background:var(--green);}

  /* 게임 캔버스 */
  #game{flex:1;position:relative;overflow:hidden;background:#c8dff0;}
  canvas{display:block;width:100%;height:100%;}

  /* 다음 정류장 */
  #nextStation{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    background:rgba(10,10,25,.88);color:#fff;
    padding:8px 20px;border-radius:12px;
    border:1.5px solid rgba(255,255,255,.12);
    font-size:13px;z-index:5;text-align:center;max-width:90%;
    backdrop-filter:blur(4px);
  }
  #nextStation .lbl{font-size:9px;color:var(--yellow);letter-spacing:1.5px;font-family:'Space Grotesk',sans-serif;font-weight:700;margin-bottom:2px;text-transform:uppercase;}
  #nextStation .name{font-size:15px;font-weight:900;word-break:keep-all;}

  /* 승객 큐 */
  /* 승객 큐 */
  #queuePanel{
    position:absolute;bottom:0;left:0;right:0;
    background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.97) 28%);
    padding:18px 6px 8px;z-index:4;
  }
  #queueTitle{color:var(--muted);font-size:10px;letter-spacing:1px;text-align:center;margin-bottom:8px;font-family:'Space Grotesk',sans-serif;font-weight:700;text-transform:uppercase;}
  #queueTitle .front{color:var(--text);}
  #queue{
    display:flex;gap:8px;justify-content:center;align-items:flex-end;
    min-height:140px;padding:0 8px 4px;
    overflow:visible;
    max-width:100%;margin:0 auto;
  }
.pax{
    background:#fff;border:1.5px solid var(--border);
    padding:8px 6px 9px;border-radius:10px;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    flex:1 1 0;min-width:0;max-width:200px;overflow:hidden;
    transition:transform .3s cubic-bezier(.5,1.5,.5,1),box-shadow .3s;
    box-shadow:0 2px 8px rgba(0,0,0,.07);
    position:relative;
  }
  .pax .avatar{width:36px !important;height:36px !important;}
  /* .pax .avatar{width:28px;height:28px;image-rendering:pixelated;border-radius:5px;overflow:hidden;} */
  .pax .name{
    font-size:10px;font-weight:700;line-height:1;text-align:center;
    font-family:'Noto Sans KR',sans-serif;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;
  }
  .pax .dest-label{
    font-size:7.5px;color:var(--muted);line-height:1;margin-top:2px;
    border-top:1px solid var(--border);padding-top:2px;width:100%;
    text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:500;
  }
  .pax .dest{
    font-size:11px;
    color:var(--text);
    text-align:center;
    line-height:1.25;
    font-weight:900;
    word-break:keep-all;
    padding:0 3px;
    font-family:'Noto Sans KR',sans-serif;
    width:100%;
    overflow:visible;
    white-space:normal;
  }
  .pax .name{
    font-size:11.5px !important;
  }
  .pax.front{
    border-color:var(--yellow);
    transform:translateY(-10px) scale(1.04);
    box-shadow:0 6px 20px rgba(245,158,11,.2);
  }
  .pax.front .dest{color:var(--red);}
  .pax.front .dest-label{color:var(--muted);border-color:rgba(245,158,11,.3);}
  .pax.front::after{
    content:'▼';position:absolute;top:-18px;left:50%;transform:translateX(-50%);
    color:var(--yellow);font-size:16px;animation:arrow-bounce .6s infinite;
  }
  @keyframes arrow-bounce{50%{transform:translateX(-50%) translateY(4px);}}
  
  /* 벨 오버레이 */
  #bellOverlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,.45);z-index:10;backdrop-filter:blur(2px);}
  #bellOverlay.show{display:flex;}
  #bellSign{
    background:rgba(10,10,25,.95);color:rgba(255,255,255,.25);
    border:1.5px solid rgba(255,255,255,.08);
    padding:10px 28px;border-radius:12px;
    font-family:'Space Grotesk',monospace;font-size:13px;font-weight:700;
    min-width:240px;text-align:center;letter-spacing:2px;margin-bottom:28px;
    transition:color .08s,box-shadow .08s;
  }
  #bellSign.red{color:#fff;box-shadow:0 0 24px rgba(239,68,68,.4);}
  #bellCase{
    background:radial-gradient(circle at 30% 30%,#2a2a3a,#12121e 60%,#08080f);
    border:3px solid rgba(255,255,255,.06);padding:22px;border-radius:20px;
    box-shadow:0 12px 40px rgba(0,0,0,.5);position:relative;
  }
  #bellCase::before{content:'STOP';position:absolute;top:6px;left:50%;transform:translateX(-50%);font-family:'Space Grotesk',monospace;font-size:8px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:3px;}
  #bellCase::after{content:'하차벨';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1px;}
  #bell{
    width:104px;height:104px;border-radius:50%;
    background:radial-gradient(circle at 32% 32%,#f0f0f0 0%,#c8c8c8 50%,#888 100%);
    border:3px solid rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 10px 0 rgba(0,0,0,.5),inset 0 -6px 12px rgba(0,0,0,.3),inset 0 4px 8px rgba(255,255,255,.5);
    transition:background .15s,box-shadow .05s,transform .05s;
    font-family:'Noto Sans KR',sans-serif;font-size:18px;font-weight:900;color:#555;
  }
  #bell.red{
    background:radial-gradient(circle at 32% 32%,#ff7070 0%,#ef4444 40%,#b91c1c 100%);
    color:#fff;
    box-shadow:0 10px 0 rgba(127,0,0,.6),0 0 40px rgba(239,68,68,.7),inset 0 -6px 12px rgba(0,0,0,.4),inset 0 4px 8px rgba(255,255,255,.25);
    animation:bell-glow .35s infinite;
  }
  @keyframes bell-glow{50%{box-shadow:0 10px 0 rgba(127,0,0,.6),0 0 56px rgba(239,68,68,1),inset 0 -6px 12px rgba(0,0,0,.4),inset 0 4px 8px rgba(255,255,255,.25);}}
  
  #bell.pressed{transform:translateY(7px);box-shadow:0 3px 0 rgba(0,0,0,.5),inset 0 -6px 12px rgba(0,0,0,.5);}
  #bellHint{color:rgba(255,255,255,.65);font-size:12px;margin-top:16px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-weight:500;}
  #bellHint .key{display:inline-block;background:rgba(255,255,255,.12);color:var(--yellow);padding:3px 10px;border-radius:6px;font-family:'Space Grotesk',monospace;font-size:10px;font-weight:700;margin-left:4px;border:1px solid rgba(255,255,255,.1);}

  /* 이동 힌트 */
  /* 이동 힌트 — 처음 5초간만 보였다가 자연스럽게 사라짐 */
  #moveHint{
    position:absolute;bottom:175px;left:50%;transform:translateX(-50%);
    background:rgba(10,10,25,.78);color:rgba(255,255,255,.85);
    padding:7px 14px;border-radius:10px;
    border:1px solid rgba(255,255,255,.08);
    font-size:11px;z-index:5;display:flex;gap:6px;align-items:center;
    font-family:'Noto Sans KR',sans-serif;font-weight:500;
    backdrop-filter:blur(6px);
    transition:opacity .6s ease;
    pointer-events:none;
  }
  #moveHint.fade{opacity:0;}
  /* 키캡 스타일 */
  #moveHint kbd{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:22px;height:22px;padding:0 5px;
    background:linear-gradient(180deg,#2a2a3a,#1a1a26);
    color:#fff;
    border:1px solid rgba(255,255,255,.18);
    border-bottom:2px solid rgba(0,0,0,.6);
    border-radius:5px;
    font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;
    box-shadow:0 1px 0 rgba(255,255,255,.06) inset;
    letter-spacing:.3px;
  }
  #moveHint kbd.wide{padding:0 9px;font-size:9.5px;}
  #moveHint .sep{color:rgba(255,255,255,.35);margin:0 2px;font-size:10px;}
  #moveHint .hint-mb{font-weight:700;letter-spacing:.3px;}
  .kbd{
    display:inline-block;background:var(--yellow);color:#111;
    padding:2px 8px;border-radius:5px;
    font-family:'Space Grotesk',monospace;font-size:10px;font-weight:700;
    margin:0 1px;
  }
  .kbd-pc{
    display:inline-block;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);
    padding:2px 7px;border-radius:5px;
    font-family:'Noto Sans KR',sans-serif;font-size:9.5px;font-weight:700;
    margin-right:3px;letter-spacing:.3px;
  }
  /* 화면 크기에 따라 PC/모바일 안내 자동 전환 */
  .hint-pc{display:inline;}
  .hint-mb{display:none;}
  @media(max-width:640px){
    .hint-pc{display:none;}
    .hint-mb{display:inline;}
  }
  #tapZones{
    position:absolute;top:0;bottom:140px;left:0;right:0;
    display:none;flex-direction:row;z-index:3;pointer-events:none;
  }
  /* 모바일 좌우 이동 버튼 */
/* 모바일 좌우 이동 버튼 — 큐 패널 좌우에 배치 */
/* 큐 + 좌우 버튼 한 줄 배치 */
/* 모바일 다음 승객 버튼 — SPACE 키와 동일 기능 */
#nextPaxBtn{
  display:none;
  position:absolute;
  bottom:170px;left:50%;transform:translateX(-50%);
  z-index:8;
  padding:14px 28px;border-radius:50px;
  background:var(--yellow);color:#111;
  border:none;
  font-family:'Noto Sans KR',sans-serif;
  font-size:15px;font-weight:900;letter-spacing:.5px;
  box-shadow:0 6px 20px rgba(245,158,11,.5),0 0 0 4px rgba(245,158,11,.2);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  align-items:center;justify-content:center;gap:8px;
  animation:pulse-btn 1.5s infinite;
}
#nextPaxBtn:active{
  transform:translateX(-50%) scale(.94);
  box-shadow:0 3px 10px rgba(245,158,11,.4);
}
@keyframes pulse-btn{
  0%,100%{box-shadow:0 6px 20px rgba(245,158,11,.5),0 0 0 4px rgba(245,158,11,.2);}
  50%{box-shadow:0 6px 24px rgba(245,158,11,.7),0 0 0 10px rgba(245,158,11,.05);}
}
@media(max-width:640px){
  #nextPaxBtn.show{display:flex;}
}
  .tap-zone{
    flex:1;pointer-events:auto;position:relative;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;-webkit-tap-highlight-color:transparent;
    transition:background .15s;
  }
  /* 양쪽 절반에 옅은 색감 — 화면이 둘로 나뉘었음을 보여줌 */
  .tap-left{
    background:linear-gradient(90deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.02) 100%);
  }
  .tap-right{
    background:linear-gradient(270deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.02) 100%);
  }
  /* 가운데 하얀 분할선 + 블러 글로우 */
  .tap-left::after{
    content:'';position:absolute;top:6%;bottom:6%;right:-1px;width:2px;
    background:rgba(255,255,255,.55);
    box-shadow:0 0 14px 3px rgba(255,255,255,.45),0 0 28px 6px rgba(255,255,255,.2);
    backdrop-filter:blur(4px);
    pointer-events:none;
  }
  /* 좌/우 화살표 힌트 — 평소엔 옅게, 탭하면 진하게 */
  .tap-zone::before{
    font-size:46px;font-weight:300;
    color:rgba(255,255,255,.28);
    text-shadow:0 2px 12px rgba(0,0,0,.3);
    transition:color .12s,transform .12s;
  }
  .tap-left::before{content:'◀';}
  .tap-right::before{content:'▶';}
  .tap-zone:active{background:rgba(255,255,255,.18);}
  .tap-zone:active::before{color:rgba(255,255,255,.85);transform:scale(1.2);}
  /* 공통 오버레이 */
  /* 공통 오버레이 */
  .overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 20px;text-align:center;background:rgba(5,5,15,.96);color:#fff;z-index:40;overflow-y:auto;}
  .overlay.show{display:flex;}
  .overlay h1{font-size:22px;font-weight:900;color:var(--yellow);margin-bottom:2px;line-height:1.2;}
  .overlay .sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:8px;font-weight:500;}
  .overlay .card{
    background:rgba(255,255,255,.05);color:#fff;
    padding:8px 14px;max-width:520px;
    border:1.5px solid rgba(255,255,255,.1);border-radius:12px;
    margin-bottom:8px;font-size:12px;line-height:1.5;text-align:center;
    font-family:'Noto Sans KR',sans-serif;
  }
  .overlay .card b{color:var(--yellow);}
  .btn{
    background:var(--yellow);color:#111;border:none;
    padding:12px 28px;border-radius:12px;
    font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:900;
    cursor:pointer;box-shadow:0 4px 16px rgba(245,158,11,.3);margin:4px;
    transition:opacity .15s,transform .1s;
  }
  .btn:active{opacity:.8;transform:scale(.97);}
  .btn.small{padding:8px 18px;font-size:13px;}
  .quote{font-size:11px;color:rgba(255,255,255,.35);margin-top:8px;font-style:italic;padding-bottom:8px;}
  .quote {
  margin-top: 16px;
  padding: 15px 18px;
  color: #fff;
  font-size: 11px;
  font-weight: 900;
  line-height: 1.45;
  letter-spacing: -0.3px;


}
  /* 노선 선택 */
  /* 노선 선택 */
  .route-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:520px;margin-bottom:14px;width:100%;}
  .route-btn{
    background:rgba(255,255,255,.05);color:#fff;
    border:1.5px solid rgba(255,255,255,.1);border-radius:12px;
    padding:10px 14px;text-align:left;cursor:pointer;
    transition:background .15s,border-color .15s,transform .1s;
    font-family:'Noto Sans KR',sans-serif;
  }
  .route-btn:active{transform:scale(.97);}
  .route-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);transform:translateY(-2px);}
  .route-btn .rno{font-family:'Space Grotesk',monospace;font-size:10px;font-weight:700;display:inline-block;padding:2px 9px;border-radius:100px;color:#fff;margin-bottom:4px;}
  .rn1{background:#3b82f6;}.rn2{background:#ef4444;}.rn3{background:#22c55e;}.rn4{background:#8b5cf6;}
  .route-btn .title{font-size:14px;font-weight:900;margin-bottom:2px;}
  .route-btn .desc{font-size:10.5px;color:rgba(255,255,255,.75);line-height:1.3;font-family:'Space Grotesk',sans-serif;font-weight:500;}
  .route-btn .info{font-size:10px;color:rgba(255,255,255,.4);line-height:1.3;margin-top:3px;word-break:keep-all;}

  /* 랜덤 CTA — 분리된 강조 버튼 */
  .route-random{
    max-width:520px;width:100%;
    background:var(--yellow);color:#111;
    border:none;border-radius:12px;
    padding:11px;margin-bottom:8px;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:900;
    box-shadow:0 4px 16px rgba(245,158,11,.35);
    transition:transform .1s,box-shadow .15s;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .route-random:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,158,11,.5);}
  .route-random:active{transform:scale(.98);}
  .route-random .dice{font-size:20px;}
  .pick-hint{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:10px;letter-spacing:.5px;}

  /* 결과 팝업 */
  #stopResult{
    position:absolute;top:22%;left:50%;transform:translate(-50%,-50%);
    padding:14px 28px;border-radius:14px;
    font-family:'Noto Sans KR',sans-serif;font-size:18px;font-weight:900;
    display:none;z-index:20;text-align:center;max-width:88%;
    border:1.5px solid rgba(255,255,255,.15);
    backdrop-filter:blur(8px);
  }
  #stopResult.good{background:rgba(22,101,52,.95);color:#fff;}
  #stopResult.bad{background:rgba(127,29,29,.95);color:#fff;}
  #stopResult.meh{background:rgba(120,80,0,.95);color:#fff;}
  #stopResult .rank{font-family:'Space Grotesk',monospace;font-size:30px;font-weight:700;display:block;margin-top:4px;}
  #stopResult .ms{font-family:'Space Grotesk',monospace;font-size:12px;display:block;margin-top:4px;opacity:.7;}

  /* 엔딩 */

/* ================= AUDIO ================= */
const A=(()=>{
  let c=null,failed=false;
  const g=()=>{if(failed)return null;if(!c){try{c=new(window.AudioContext||window.webkitAudioContext)();}catch(e){failed=true;return null;}}return c;};
  const b=(f,d,t,v,slide)=>{try{
    const x=g();if(!x)return;
    const o=x.createOscillator(),a=x.createGain();
    o.type=t||'square';o.frequency.value=f;
    if(slide)o.frequency.exponentialRampToValueAtTime(slide,x.currentTime+d);
    a.gain.setValueAtTime(v||.1,x.currentTime);
    a.gain.exponentialRampToValueAtTime(.001,x.currentTime+d);
    o.connect(a);a.connect(x.destination);o.start();o.stop(x.currentTime+d);
  }catch(e){}};
  return{
    countdown:(n)=>{if(n>0)b(500+n*100,.1,'square',.12);else{b(880,.2,'triangle',.15);setTimeout(()=>b(1100,.3,'triangle',.18),100);}},
    ding:()=>{b(784,.25,'sine',.25);setTimeout(()=>b(659,.4,'sine',.22),200);},
    engine:()=>{try{const x=g();if(!x)return{stop:()=>{}};const o=x.createOscillator(),a=x.createGain();o.type='sawtooth';o.frequency.value=70;a.gain.value=.04;o.connect(a);a.connect(x.destination);o.start();return{stop:()=>{a.gain.exponentialRampToValueAtTime(.001,x.currentTime+.3);setTimeout(()=>o.stop(),350);}};}catch(e){return{stop:()=>{}};}},
    brake:()=>{b(1200,.2,'sawtooth',.1,400);setTimeout(()=>b(400,.2,'sawtooth',.08,200),100);},
    perfect:()=>{[880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>b(f,.15,'triangle',.14),i*70));},
    good:()=>{b(660,.12,'square',.12);setTimeout(()=>b(880,.15,'triangle',.12),80);},
    miss:()=>{b(200,.4,'sawtooth',.18,80);},
    angry:()=>{b(140,.1,'square',.15);setTimeout(()=>b(120,.15,'square',.15),90);setTimeout(()=>b(100,.2,'square',.13),200);},
    swap:()=>{b(440,.06,'square',.08);setTimeout(()=>b(660,.06,'square',.08),50);},
    arrive:()=>{b(600,.15,'sine',.1);setTimeout(()=>b(800,.2,'sine',.1),100);},
  };
})();

/* ================= ROUTE PICK ================= */
function renderRoutePick(){
  const pick=document.getElementById('routePick');pick.innerHTML='';
  Object.values(ROUTES).forEach(r=>{
    const btn=document.createElement('div');
    btn.className='route-btn';
    btn.setAttribute('role','button');
    btn.setAttribute('tabindex','0');
    btn.innerHTML=`<span class="rno ${r.cname}">${r.no}번</span><div class="title">${r.title}</div><div class="desc">${r.desc}</div><div class="info">${r.info}</div>`;
    let touched=false;
    const handler=(e)=>{
      e.preventDefault();
      if(e.type==='touchstart'){touched=true;}
      if(e.type==='click'&&touched){return;} // 중복 방지
      selectRoute(r.no);
    };
    btn.addEventListener('touchstart',handler,{passive:false});
    btn.addEventListener('click',handler);
    pick.appendChild(btn);
  });
  const randBtn=document.getElementById('btnRandom');
  if(randBtn){
    const randHandler=(e)=>{e.preventDefault();const keys=Object.keys(ROUTES);selectRoute(+keys[Math.floor(Math.random()*keys.length)]);};
    randBtn.addEventListener('click',randHandler);
    randBtn.addEventListener('touchend',randHandler,{passive:false});
  }
}

  // iOS: 사용자 제스처 시점에 오디오 컨텍스트 활성화
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();}catch(e){}
  currentRoute=ROUTES[no];STOPS=currentRoute.stops;
  const badge=document.getElementById('routeBadge');
  badge.textContent='성공버스 '+currentRoute.no+'노선';
  badge.style.background=currentRoute.color;
  document.getElementById('totalStops').textContent=STOPS.length;
  startGame();
}

/* ================= GAME ================= */
function genPassengers(){
  const pool=[...PAX_POOL];const paxList=[];
  const assign=STOPS.map((_,i)=>i);
  for(let i=assign.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[assign[i],assign[j]]=[assign[j],assign[i]];}
  for(let i=0;i<STOPS.length;i++){const idx=Math.floor(Math.random()*pool.length);const p=pool.splice(idx,1)[0];paxList.push({name:p.name,type:p.type,destIdx:assign[i]});}
  return paxList;
}
function startGame(){
  document.getElementById('intro').classList.remove('show');
  resize();state.curStopIdx=-1;state.passengers=genPassengers();state.stopResults=[];state.score=0;
  renderRouteBar();renderQueue();renderScore();startCountdown(()=>startMoving());
}
function startCountdown(cb){
  const cd=document.getElementById('countdown');const num=document.getElementById('cdNum');
  cd.classList.add('show');let n=3;
  const step=()=>{num.textContent=n===0?'출발!':n;num.style.animation='none';num.offsetHeight;num.style.animation='cd-pop .7s';A.countdown(n);if(n===0){setTimeout(()=>{cd.classList.remove('show');cb();},500);}else{n--;setTimeout(step,700);}};step();
}
function startMoving(){
  state.curStopIdx++;if(state.curStopIdx>=STOPS.length){endGame();return;}
  state.phase='moving';state.stationProgress=0;state.moveStartTime=performance.now();state.moveDuration=3500+Math.random()*1500;
  document.getElementById('nextName').textContent=STOPS[state.curStopIdx].name;
  document.getElementById('curStopNum').textContent=state.curStopIdx+1;
  // 첫 정류장에서만 힌트 표시, 이후엔 자동 숨김
  const hint=document.getElementById('moveHint');
  if(state.curStopIdx===0){
    hint.style.display='flex';
    hint.classList.remove('fade');
    // 5초 뒤 자동 페이드
    state.hintTimer=setTimeout(()=>hint.classList.add('fade'),5000);
  }else{
    hint.style.display='none';
  }
  document.getElementById('tapZones').style.display='flex';
  document.getElementById('nextPaxBtn').classList.add('show');
  document.getElementById('nextPaxBtn').textContent='▶ 다음 승객';
  document.getElementById('nextStation').style.display='block';
  document.getElementById('bellOverlay').classList.remove('show');
  renderRouteBar();state.engineRef=A.engine();
  if(!state.animId)state.animId=requestAnimationFrame(loop);
}
function loop(ts){update(ts);draw(ts);state.animId=requestAnimationFrame(loop);}
function update(ts){
  if(state.phase==='moving'){
    const el=ts-state.moveStartTime;state.stationProgress=Math.min(1,el/state.moveDuration);
    if(state.stationProgress>=1)arriveAtStop();
  } else if(state.phase==='waitBell'){
    if(!state.redBellShown&&ts>=state.perfectBellTime){
      state.redBellShown=true;
      document.getElementById('bell').classList.add('red');
      document.getElementById('bellSign').classList.add('red');
      document.getElementById('bellSign').textContent='▶  문열기  ◀';
      A.arrive();
    }
    if(state.redBellShown&&ts>state.perfectBellTime+3000)handleBellPress(true);
  }
}
function arriveAtStop(){
  state.phase='arriving';if(state.engineRef){state.engineRef.stop();state.engineRef=null;}A.brake();
  document.getElementById('moveHint').style.display='none';document.getElementById('nextStation').style.display='none';
  document.getElementById('tapZones').style.display='none';
// 정차 단계에서도 버튼 유지 — 텍스트만 "벨 누르기"로 변경
  document.getElementById('nextPaxBtn').textContent='⏰ 벨 누르기';
  const delay=800+Math.random()*700;state.perfectBellTime=performance.now()+delay;state.redBellShown=false;state.bellPressed=false;
  setTimeout(()=>{
    state.phase='waitBell';
    const bell=document.getElementById('bell'),sign=document.getElementById('bellSign');
    bell.classList.remove('red','pressed');sign.classList.remove('red');
    sign.textContent='━━━  정차 중  ━━━';bell.textContent='문열기';
    document.getElementById('bellOverlay').classList.add('show');
  },400);
}
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();e.stopPropagation();if(e.repeat)return;
    if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();
    if(state.phase==='moving')swapQueueForward();else if(state.phase==='waitBell')onBellPress(e);
  }
  if(e.code==='ArrowLeft'){e.preventDefault();if(e.repeat)return;
    if(state.phase==='moving')swapQueueBackward();
  }
  if(e.code==='ArrowRight'){e.preventDefault();if(e.repeat)return;
    if(state.phase==='moving')swapQueueForward();
  }
});

/* 모바일: 좌/우 탭 + 정차 시 화면 어디든 벨 */
function setupTouchZones(){
  const btn=document.getElementById('nextPaxBtn');
  if(!btn)return;
  let touched=false;
  const handler=(e)=>{
    e.preventDefault();
    if(e.type==='touchstart')touched=true;
    if(e.type==='click'&&touched){return;} // iOS 중복 방지
    // SPACE 키와 동일한 동작
    if(state.phase==='moving')swapQueueForward();
    else if(state.phase==='waitBell')onBellPress(e);
  };
  btn.addEventListener('touchstart',handler,{passive:false});
  btn.addEventListener('click',handler);
}
setupTouchZones();
function onBellPress(e){if(e)e.preventDefault();if(state.phase==='waitBell'&&!state.bellPressed)handleBellPress(false);}
let swapLock=false;
function dismissHint(){
  const hint=document.getElementById('moveHint');
  if(hint&&!hint.classList.contains('fade')){
    hint.classList.add('fade');
    if(state.hintTimer){clearTimeout(state.hintTimer);state.hintTimer=null;}
  }
}
function swapQueueForward(){
  if(swapLock)return;if(state.phase!=='moving'||state.passengers.length<2)return;
  swapLock=true;setTimeout(()=>{swapLock=false;},120);
  const first=state.passengers.shift();state.passengers.push(first);A.swap();renderQueue();
  dismissHint();
}
function swapQueueBackward(){
  if(swapLock)return;if(state.phase!=='moving'||state.passengers.length<2)return;
  swapLock=true;setTimeout(()=>{swapLock=false;},120);
  const last=state.passengers.pop();state.passengers.unshift(last);A.swap();renderQueue();
  dismissHint();
}
// 기존 호출 호환
function swapQueue(){swapQueueForward();}
function handleBellPress(timeout){
  if(state.bellPressed)return;state.bellPressed=true;state.phase='stopped';
  const now=performance.now();const diff=timeout?9999:(now-state.perfectBellTime);state.pressTime=diff;
  const bell=document.getElementById('bell');bell.classList.add('pressed');setTimeout(()=>bell.classList.remove('pressed'),120);
  if(timeout)A.miss();else A.ding();
  const frontPax=state.passengers[0];const correct=frontPax&&frontPax.destIdx===state.curStopIdx;
  let rank,title,points,cls;
  if(!correct){rank='X';title=frontPax?frontPax.name+'님 잘못 내림':'하차 실패';points=0;cls='bad';A.angry();}
  else if(timeout){rank='F';title='너무 늦음';points=10;cls='bad';}
  else if(diff<-300){rank='F';title='너무 빠름';points=10;cls='bad';}
  else{const abs=Math.abs(diff);
    if(abs<80){rank='S+';title='퍼펙트!';points=200;cls='good';A.perfect();}
    else if(abs<150){rank='S';title='훌륭해요!';points=150;cls='good';A.good();}
    else if(abs<300){rank='A';title='좋은 타이밍';points=100;cls='good';A.good();}
    else if(abs<500){rank='B';title='무난';points=60;cls='meh';}
    else if(abs<800){rank='C';title='느림';points=30;cls='meh';}
    else{rank='D';title='많이 늦음';points=10;cls='bad';}
  }
  state.score+=points;
  state.stopResults.push({stopIdx:state.curStopIdx,paxName:frontPax?frontPax.name:'-',correct,rank,points,ms:timeout?null:Math.round(Math.abs(diff))});
  renderScore();showStopResult(rank,title,timeout?'미반응':Math.round(Math.abs(diff))+'ms '+(diff>=0?'늦음':'빠름'),cls,correct);
  setTimeout(()=>{if(correct){state.passengers.shift();renderQueue();}else{state.passengers.push(state.passengers.shift());renderQueue();}},800);
  setTimeout(()=>{
    hideStopResult();
    document.getElementById('bellOverlay').classList.remove('show');
    document.getElementById('nextPaxBtn').classList.remove('show');
    if(state.curStopIdx>=STOPS.length-1)endGame();else startMoving();
  },2200);
}
function showStopResult(rank,title,ms,cls,correct){
  const el=document.getElementById('stopResult');el.className=cls;
  el.innerHTML=`<div>${title}</div><span class="rank">${rank}</span>${correct?`<span class="ms">${ms}</span>`:''}`;el.style.display='block';
}
function hideStopResult(){document.getElementById('stopResult').style.display='none';}

/* ================= RENDER ================= */
function renderRouteBar(){
  const bar=document.getElementById('routeBar');bar.innerHTML='';
  STOPS.forEach((s,i)=>{
    const done=i<state.curStopIdx,cur=i===state.curStopIdx;
    const div=document.createElement('div');div.className='stop-dot'+(done?' done':'')+(cur?' current':'');
    div.innerHTML=`<div class="name">${s.short}</div>`;bar.appendChild(div);
    if(i<STOPS.length-1){const line=document.createElement('div');line.className='stop-line'+(done?' done':'');bar.appendChild(line);}
  });
}
function renderQueue(){
  const q=document.getElementById('queue');
  q.innerHTML='';

  const isMobile=window.innerWidth<=640;

  state.passengers.forEach((p,i)=>{
    const el=document.createElement('div');
    const isFront=i===0;
    el.className='pax'+(isFront?' front':'');

    const stop=STOPS[p.destIdx];

    // front는 풀카드명, 작은 카드는 mini 약어
    let destText;
    if(isFront){
      destText=stop.card || stop.short || stop.name;
    } else if(isMobile){
      destText=stop.mini || stop.short || stop.name;
    } else {
      destText=stop.card || stop.short || stop.name;
    }

    // 모바일에서 작은 카드는 이름도 2자만 (성 빼고 이름만 또는 앞 2자)
    const displayName = p.name;

    el.innerHTML=`
      <canvas class="avatar" width="34" height="34"></canvas>
      <div class="name">${displayName}</div>
      <div class="dest-label">↓ 하차 ↓</div>
      <div class="dest">${destText}</div>
    `;

    q.appendChild(el);
    drawPaxAvatar(el.querySelector('canvas'),p.type);
  });
}
function renderScore(){document.getElementById('scoreBox').textContent='SCORE '+state.score;}

/* ================= PIXEL AVATAR ================= */
function drawPaxAvatar(cv,type){
  const c=cv.getContext('2d');c.imageSmoothingEnabled=false;c.clearRect(0,0,34,34);
  const palettes={
    elder_f:{skin:'#e8c4a0',hair:'#c8c8c8',top:'#a880c0',bot:'#604050'},
    elder_m:{skin:'#e8c4a0',hair:'#888',top:'#807060',bot:'#403020'},
    student:{skin:'#f0d0a8',hair:'#301810',top:'#3060a0',bot:'#202040'},
    office:{skin:'#f0d0a8',hair:'#201008',top:'#505060',bot:'#202028'},
    parent:{skin:'#f0d0a8',hair:'#401810',top:'#c86060',bot:'#403018'},
    pregnant:{skin:'#f0d0a8',hair:'#401810',top:'#e8b880',bot:'#604028'},
    kid:{skin:'#f0d0a8',hair:'#301810',top:'#f0c040',bot:'#204020'},
  };
  const p=palettes[type]||palettes.office;
  c.fillStyle=p.hair;c.fillRect(10,2,14,8);if(type==='elder_f')c.fillRect(9,4,16,5);

  c.fillStyle='#202020';c.fillRect(13,10,2,2);c.fillRect(19,10,2,2);
  if(type==='kid'){c.fillStyle='#a02828';c.fillRect(15,13,4,1);}else c.fillRect(16,13,2,1);
  c.fillStyle=p.skin;c.fillRect(14,15,6,2);
  c.fillStyle=p.top;
  if(type==='pregnant'){c.fillRect(8,17,18,10);c.fillRect(7,19,2,6);c.fillRect(25,19,2,6);}
  else c.fillRect(10,17,14,10);
  c.fillRect(7,17,3,8);c.fillRect(24,17,3,8);
  c.fillStyle=p.skin;c.fillRect(7,24,3,2);c.fillRect(24,24,3,2);
  c.fillStyle=p.bot;c.fillRect(11,27,4,6);c.fillRect(19,27,4,6);
  c.fillStyle='#202020';c.fillRect(10,32,6,2);c.fillRect(18,32,6,2);
  if(type==='elder_m'||type==='elder_f'||type==='office'){
    c.strokeStyle='#202020';c.lineWidth=1;c.strokeRect(12.5,9.5,3,3);c.strokeRect(18.5,9.5,3,3);
    c.beginPath();c.moveTo(15.5,11);c.lineTo(18.5,11);c.stroke();

}

/* ================= CANVAS DRAW ================= */
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function draw(ts){
  ctx.clearRect(0,0,W,H);
  const routeTheme=currentRoute?currentRoute.theme:'urban';
  const stop=STOPS[state.curStopIdx];const landmark=stop?stop.landmark:null;
  drawSky(ts,routeTheme);
  drawFarLayer(ts,routeTheme);
  drawNearLayer(ts,routeTheme);
  if(landmark&&(state.phase==='arriving'||state.phase==='waitBell'||state.phase==='stopped'||(state.phase==='moving'&&state.stationProgress>0.7))){
    drawLandmark(landmark,ts);
  }
  drawRoad(ts);
  if(state.phase==='arriving'||state.phase==='waitBell'||state.phase==='stopped'){drawStation(W*0.6,stop);}
  drawBus();
}

/* --- SKY --- */
function drawSky(ts,theme){
  const skyGrads={
    seongsu:['#ffd4c2','#ffb8a0','#ffd8b4'],
    market:['#ffe4c0','#ffc878','#f0b860'],
    office:['#c8dcf5','#dce8f8','#eef2f8'],
    hill:['#b8d4e8','#cce0ee','#e0d8c8'],
    urban:['#c8e0f5','#dce8f8','#f0e8d8'],
  };
  const colors=skyGrads[theme]||skyGrads.urban;
  const g=ctx.createLinearGradient(0,0,0,H*0.52);
  g.addColorStop(0,colors[0]);g.addColorStop(0.5,colors[1]);g.addColorStop(1,colors[2]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.52);

  // Sun / glow
  const sunColors={seongsu:'rgba(255,140,80,.35)',market:'rgba(255,180,60,.3)',office:'rgba(180,210,255,.4)',hill:'rgba(160,200,230,.35)',urban:'rgba(200,220,255,.3)'};
  ctx.fillStyle=sunColors[theme]||'rgba(200,220,255,.3)';
  ctx.beginPath();ctx.arc(W*.75,H*.08,55,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sunColors[theme]?.replace('.35',',.15').replace('.3',',.12').replace('.4',',.2')||'rgba(200,220,255,.15)';
  ctx.beginPath();ctx.arc(W*.75,H*.08,85,0,Math.PI*2);ctx.fill();

  // Clouds
  const t=ts*0.015;
  ctx.fillStyle='rgba(255,255,255,.75)';
  for(let i=0;i<4;i++){
    const cx=((i*240-t)%(W+200)+W+200)%(W+200)-80;const cy=H*.06+i*H*.04;
    ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);ctx.arc(cx+16,cy,16,0,Math.PI*2);ctx.arc(cx-14,cy,14,0,Math.PI*2);ctx.fill();
  }

  if(theme==='hill'){
    const g2=ctx.createLinearGradient(0,H*.3,0,H*.52);g2.addColorStop(0,'rgba(100,130,110,.4)');g2.addColorStop(1,'rgba(100,130,110,0)');
    ctx.fillStyle=g2;
    ctx.beginPath();ctx.moveTo(0,H*.52);
    for(let x=0;x<=W;x+=25){ctx.lineTo(x,H*.52-40-Math.sin(x*.008)*18-Math.sin(x*.002+1)*14);}
    ctx.lineTo(W,H*.52);ctx.closePath();ctx.fill();
  }
  if(theme==='office'){
    ctx.fillStyle='rgba(150,175,210,.4)';
    for(let i=0;i<5;i++){const bx=((i*110-ts*.008)%(W+100)+W+100)%(W+100)-40;const bh=70+((i*17)%4)*22;ctx.fillRect(bx,H*.22-bh,88,bh);}
  }
}

function drawHillNear(scroll,gy){

/* --- ROAD --- */
function drawRoad(ts){
  const scroll=state.phase==='moving'?state.stationProgress*1000:0;
  const gy=H*.52;
  // Road surface
  const rg=ctx.createLinearGradient(0,gy,0,H-30);rg.addColorStop(0,'#3a3a48');rg.addColorStop(1,'#2a2a38');
  ctx.fillStyle=rg;ctx.fillRect(0,gy,W,H-gy-30);
  // Center lane dash
  ctx.strokeStyle='rgba(255,255,255,.75)';ctx.lineWidth=3;
  ctx.setLineDash([22,18]);ctx.lineDashOffset=-scroll;
  ctx.beginPath();ctx.moveTo(0,gy+(H-gy-30)*.42);ctx.lineTo(W,gy+(H-gy-30)*.42);ctx.stroke();
  ctx.setLineDash([]);
  // Edge stripe
  ctx.fillStyle='rgba(250,220,80,.7)';ctx.fillRect(0,H-32,W,2);
  // Sidewalk
  const sg=ctx.createLinearGradient(0,H-30,0,H);sg.addColorStop(0,'#e0d4bc');sg.addColorStop(1,'#cec4ae');
  ctx.fillStyle=sg;ctx.fillRect(0,H-30,W,30);
  ctx.fillStyle='rgba(0,0,0,.08)';ctx.fillRect(0,H-30,W,2);
}

/* --- STATION --- */
function drawStation(sx,stop){
  if(!stop)return;const gy=H*.52;const color=currentRoute?currentRoute.color:'#3b82f6';
  // Roof
  ctx.fillStyle=color;ctx.fillRect(sx-46,gy-72,92,9);
  // Pillars
  ctx.fillStyle='#1e293b';ctx.fillRect(sx-44,gy-72,5,72);ctx.fillRect(sx+39,gy-72,5,72);
  // Sign board
  ctx.fillStyle='#fff';roundRect(sx-62,gy-62,124,26,6);ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=2;roundRect(sx-62,gy-62,124,26,6);ctx.stroke();
  ctx.fillStyle=color;ctx.font='bold 900 12px "Noto Sans KR",sans-serif';ctx.textAlign='center';ctx.fillText(stop.short,sx,gy-48);
  ctx.fillStyle='#666';ctx.font='500 9px "Noto Sans KR",sans-serif';
  const nameShort=stop.name.length>12?stop.name.substring(0,11)+'…':stop.name;ctx.fillText(nameShort,sx,gy-38);
  // Bench
  ctx.fillStyle='#92400e';ctx.fillRect(sx-32,gy-26,64,7);ctx.fillStyle='#7c3510';ctx.fillRect(sx-30,gy-19,4,19);ctx.fillRect(sx+26,gy-19,4,19);
  ctx.textAlign='left';
}

/* --- BUS --- */
function drawBus(){
  const gy=H*.52;const x=state.phase==='moving'?W*.3:W*.4;const y=gy+48;
  const f=Math.floor(performance.now()/80);const wob=state.phase==='moving'?Math.sin(f*.5)*1.2:0;
  const rc=currentRoute?currentRoute.color:'#3b82f6';

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(x+70,y+48,82,7,0,0,Math.PI*2);ctx.fill();

  // Body
  ctx.fillStyle=rc;roundRect(x-52,y-34+wob,164,54,6);ctx.fill();
  // Roof strip
  ctx.fillStyle=darkenColor(rc,.22);ctx.fillRect(x-52,y-34+wob,164,7);
  // Rainbow (route 1) or color stripe
  if(currentRoute&&currentRoute.no===1){
    const rainbow=['#ff4a4a','#ff8a4a','#ffd84a','#4aaa6a','#4a8acc','#8a4acc'];
    for(let i=0;i<rainbow.length;i++){ctx.fillStyle=rainbow[i];ctx.fillRect(x-52+i*28,y-42+wob,28,8);}
  } else {
    ctx.fillStyle=darkenColor(rc,.1);ctx.fillRect(x-52,y-42+wob,164,8);
  }

  // Front nose
  ctx.fillStyle=rc;ctx.beginPath();ctx.moveTo(x+112,y-28+wob);ctx.lineTo(x+122,y-20+wob);ctx.lineTo(x+122,y+14+wob);ctx.lineTo(x+112,y+20+wob);ctx.closePath();ctx.fill();

  // Windows
  ctx.fillStyle='rgba(200,230,248,.92)';for(let i=0;i<5;i++){roundRect(x-42+i*30,y-26+wob,25,19,3);ctx.fill();}
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1.5;for(let i=0;i<5;i++){roundRect(x-42+i*30,y-26+wob,25,19,3);ctx.stroke();}
  // Window shine
  ctx.fillStyle='rgba(255,255,255,.25)';for(let i=0;i<5;i++){ctx.fillRect(x-41+i*30,y-25+wob,25,4);}

  // Passenger silhouettes
  ctx.fillStyle='rgba(30,20,15,.55)';
  for(let i=0;i<Math.min(5,state.passengers.length);i++){
    const wx=x-42+i*30,wy=y-26+wob;
    ctx.beginPath();ctx.arc(wx+12,wy+7,4,0,Math.PI*2);ctx.fill();ctx.fillRect(wx+7,wy+11,10,7);
  }

  // Windshield
  ctx.fillStyle='rgba(210,238,255,.9)';ctx.beginPath();ctx.moveTo(x+104,y-26+wob);ctx.lineTo(x+113,y-26+wob);ctx.lineTo(x+118,y-8+wob);ctx.lineTo(x+104,y-8+wob);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();

  // Door
  ctx.fillStyle='#1e293b';
  const doorOpen=state.phase==='stopped'?Math.min(1,(performance.now()-state.moveStartTime)*.001):0;
  ctx.fillRect(x+88,y-9+wob,9*(1-doorOpen),28);
  if(doorOpen>0){ctx.fillStyle='rgba(240,230,180,.3)';ctx.fillRect(x+88,y-7+wob,7,26);}

  // Bus label
  ctx.fillStyle='rgba(255,255,255,.95)';ctx.font='bold 900 13px "Noto Sans KR",sans-serif';ctx.textAlign='left';
  ctx.fillText('성공버스',x-40,y+4+wob);
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(x-46,y+6+wob,50,1.5);
  ctx.fillStyle='#fbbf24';ctx.font='bold 700 9px "Space Grotesk",monospace';
  ctx.fillText(String(currentRoute?currentRoute.no:1),x+97,y+18+wob);

  // Wheels
  const spin=state.phase==='moving'?state.stationProgress*50:0;
  ctx.fillStyle='#1a1a2a';ctx.beginPath();ctx.arc(x-26,y+26,14,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+92,y+26,14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#555';ctx.beginPath();ctx.arc(x-26,y+26,7,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+92,y+26,7,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=2;
  for(const cx of [-26,92]){for(let a=0;a<3;a++){const ang=spin+a*(Math.PI*2/3);ctx.beginPath();ctx.moveTo(x+cx,y+26);ctx.lineTo(x+cx+Math.cos(ang)*7,y+26+Math.sin(ang)*7);ctx.stroke();}}

  // Brake lights
  if(state.phase!=='moving'){
    ctx.fillStyle=`rgba(239,68,68,${.7+Math.sin(performance.now()*.02)*.3})`;
    ctx.fillRect(x-53,y-10+wob,4,6);ctx.fillRect(x-53,y+2+wob,4,6);
  }
  // Speed lines
  if(state.phase==='moving'){
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=2;
    for(let i=0;i<6;i++){const lx=x-60-Math.random()*45;const ly=y-18+Math.random()*38+wob;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx-22,ly);ctx.stroke();}
  }
  ctx.textAlign='left';
}

function darkenColor(hex,amount){
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,((n>>16)&255)-Math.round(255*amount));
  const g=Math.max(0,((n>>8)&255)-Math.round(255*amount));
  const b=Math.max(0,(n&255)-Math.round(255*amount));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

/* ================= ENDING ================= */
function endGame(){
  state.phase='ending';if(state.engineRef){state.engineRef.stop();state.engineRef=null;}
  const correct=state.stopResults.filter(r=>r.correct).length;
  const valid=state.stopResults.filter(r=>r.correct&&r.ms!==null);
  const avgMs=valid.length?Math.round(valid.reduce((a,b)=>a+b.ms,0)/valid.length):0;
  document.getElementById('finalScore').textContent=state.score;
  document.getElementById('statCorrect').textContent=correct+'/'+STOPS.length;
  document.getElementById('statAvg').textContent=avgMs?avgMs+'ms':'-';
  let grade;
  if(correct===STOPS.length&&avgMs<150)grade='S+';
  else if(correct===STOPS.length&&avgMs<300)grade='S';
  else if(correct>=STOPS.length-1&&avgMs<400)grade='A';
  else if(correct>=STOPS.length-2)grade='B';
  else if(correct>=2)grade='C';
  else grade='D';
  const gradeEl=document.getElementById('finalGrade');gradeEl.textContent=grade;
  const gradeColors={'S+':'#f59e0b','S':'#f59e0b','A':'#22c55e','B':'#3b82f6','C':'#f97316','D':'#888'};
  gradeEl.style.color=gradeColors[grade]||'#fff';
  const bd=document.getElementById('stopBreakdown');
  bd.innerHTML=state.stopResults.map(r=>{
    const stop=STOPS[r.stopIdx];const sn=stop.name.length>10?stop.name.substring(0,9)+'…':stop.name;
    return `<div class="line"><span style="flex:1.3">${sn}</span><span style="flex:1">${r.paxName}</span><span style="color:${r.correct?'#22c55e':'#ef4444'};flex:.4;text-align:center;font-weight:700">${r.rank}</span><span style="flex:.6;font-family:'Space Grotesk',monospace">${r.ms!==null?r.ms+'ms':'-'}</span><span style="color:#f59e0b;flex:.5;text-align:right;font-family:'Space Grotesk',monospace;font-weight:700">+${r.points}</span></div>`;
  }).join('');
  document.getElementById('ending').classList.add('show');
}

renderRoutePick();
