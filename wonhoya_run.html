function safeGet(key,fallback=''){
  try{
    const v=window.localStorage.getItem(key);
    return v===null?fallback:v;
  }catch(e){
    return fallback;
  }
}
function safeSet(key,value){
  try{window.localStorage.setItem(key,value);}catch(e){}
}
/* =========================================================  AUDIO  */
const A=(()=>{
  let c=null;
  const g=()=>{if(!c)c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==='suspended')c.resume();return c;};
  const b=(f,d,t,v)=>{t=t||'square';v=v||0.1;try{const x=g(),o=x.createOscillator(),a=x.createGain();o.type=t;o.frequency.value=f;a.gain.setValueAtTime(v,x.currentTime);a.gain.exponentialRampToValueAtTime(0.001,x.currentTime+d);o.connect(a);a.connect(x.destination);o.start();o.stop(x.currentTime+d);}catch(e){}};
  return{
    jump:()=>b(700,.08),jump2:()=>b(900,.07,'triangle',.08),
    hit:()=>b(150,.15,'sawtooth',.18),point:()=>b(880,.05),
    heal:()=>b(1100,.06,'triangle',.07),
    item:()=>{b(880,.05,'triangle',.08);setTimeout(()=>b(1320,.08,'triangle',.08),60);},
    boost:()=>{[660,880,1100,1320].forEach((f,i)=>setTimeout(()=>b(f,.06,'triangle',.1),i*40));},
    mash:()=>b(500+Math.random()*300,.04,'square',.06),
    bossMash:()=>b(400+Math.random()*200,.05,'sawtooth',.08),
    grade:(g)=>{const m={S:[880,1100,1320],A:[660,880,1100],B:[440,550,660],C:[330,280,220]}[g]||[220,180,140];m.forEach((f,i)=>setTimeout(()=>b(f,.12,'square',.1),i*100));},
    gameover:()=>{b(440,.12);setTimeout(()=>b(330,.12),130);setTimeout(()=>b(220,.3),260);},
    start:()=>{b(440,.07);setTimeout(()=>b(660,.09),80);setTimeout(()=>b(880,.14),170);},
    stageup:()=>{[440,550,660,880,1100].forEach((f,i)=>setTimeout(()=>b(f,.1,'triangle',.12),i*70));},
    ending:()=>{[880,1100,1320,1760,2200].forEach((f,i)=>setTimeout(()=>b(f,.2,'triangle',.15),i*120));},
    speedup:()=>{[440,550,660,880].forEach((f,i)=>setTimeout(()=>b(f,.08,'square',.12),i*60));},
  };
})();

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function uiCard(x,y,w,h,r,bg,border){
  ctx.fillStyle=bg||'rgba(10,10,20,.82)';
  roundRect(x,y,w,h,r||10);ctx.fill();
  if(border){ctx.strokeStyle=border;ctx.lineWidth=1.5;roundRect(x,y,w,h,r||10);ctx.stroke();}
}

function pickPolicy(){
  const r=Math.random();
  if(r<0.05){const ep=POLICIES.filter(p=>p.rarity==='epic');return ep[Math.floor(Math.random()*ep.length)];}
  if(r<0.25){const ra=POLICIES.filter(p=>p.rarity==='rare');return ra[Math.floor(Math.random()*ra.length)];}
  const co=POLICIES.filter(p=>p.rarity==='common');return co[Math.floor(Math.random()*co.length)];
}

/* =========================================================  HELPERS  */
function spd(){
  // 속도 1.3배: 기본 9.1 시작, 가속 후 파이널에서 다시 기본 속도로
  const s=score;
  let base;
  if(s<=50)base=9.1+s*0.156;                 // 9.1 → 16.9 (성동구)
  else if(s<=150)base=16.9+(s-50)*0.052;     // 16.9 → 22.1 (왕십리~동대문)
  else if(s<=200)base=22.1-(s-150)*0.26;     // 22.1 → 9.1 (을지로에서 점진 감속)
  else base=9.1;                              // 200점 이후 (파이널/중구) = 기본 속도 9.1
  const now=performance.now();
  return now<busBoostEndTime?base*1.45:base;
}
function carSpd(){
  // 차량 속도 1.3배
  const s=score;
  if(s<=50)return 7.8+s*0.065;                  // 7.8 → 11.05
  if(s<=150)return 11.05+(s-50)*0.026;          // 11.05 → 13.65

function handleSpace(e){
  if(e)e.preventDefault();
  if(phase==='title'){startGame();return;}
  if(phase==='gameover'){startGame();return;}
  if(phase==='ending'){startGame();return;}
  if(phase!=='playing')return;
  if(mission&&mission.active&&mission.type==='red'){
    const now=performance.now();
    // 이미 탭했으면 무시
    if(mission.tapped)return;
    mission.tapped=true;
    mission.tapTime=now;
    const greenAt=mission.startTime+(mission.waitMs||RED_WAIT_MIN_MS);
    const diff=now-greenAt; // 음수: 프라이스타트, 양수: 초록불 뒤
    if(diff<0){
      // 너무 빨리 탭 = 신호위반
      mission.judgement='FAIL';
      mission.diff=diff;
    }else if(Math.abs(diff)<=RED_PERFECT_MS){
      mission.judgement='PERFECT';mission.diff=diff;
    }else if(Math.abs(diff)<=RED_GOOD_MS){
      mission.judgement='GOOD';mission.diff=diff;
    }else if(Math.abs(diff)<=RED_OK_MS){
      mission.judgement='OK';mission.diff=diff;
    }else{
      mission.judgement='FAIL';mission.diff=diff;
    }
    A.point();
    // 탭 즉시 미션 종료 → 판정 카드가 공백 없이 바로 표시됨
    endMission();
    return;
  }
  if(mission&&mission.active&&mission.type==='shelter'){mission.mashCount++;A.mash();A.heal();return;}
  if(bossEvent&&bossEvent.active){
    if(bossEvent.mode==='typing'){focusTypingInput();return;}
    bossEvent.mashCount++;bossEvent.pushProgress=Math.min(1,bossEvent.pushProgress+BOSS_GAIN);A.bossMash();return;
  }
  if(P.jumpCount<2){
    const superActive=performance.now()<superJumpEndTime;
    P.vy=superActive?-17:-11;P.jumpCount++;
    if(P.jumpCount===1)A.jump();else A.jump2();
  }
}

const BOSS_DECAY=GAME_TUNING.BOSS_DECAY,BOSS_GAIN=GAME_TUNING.BOSS_MASH_GAIN,BOSS_DUR=GAME_TUNING.BOSS_DURATION,BOSS_WIN_THRESHOLD=0.985;
const BOSS_TYPING_WORDS=[
  '반지하 전수조사','스마트 흡연부스','AI 자동 인허가','노후 하수관 교체',

];
function normalizeTypingText(str){return (str||'').replace(/\s+/g,'').trim();}
function pickTypingSet(count=GAME_TUNING.BOSS_TYPING_WORD_COUNT){
  const pool=[...BOSS_TYPING_WORDS].sort(()=>Math.random()-.5);

function bossRemainingMs(now=performance.now()){
  if(!bossEvent)return 0;
  const actionStart=Math.max(bossEvent.startTime,bossEvent.previewUntil||bossEvent.startTime);
  return Math.max(0,bossEvent.duration-Math.max(0,now-actionStart));
}
function focusTypingInput(){

function resetTypingInput(){

// 한글 자모 분해: 한 음절이 target의 해당 위치 음절의 "진행 중" 상태인지 체크
function isHangulPrefixMatch(target, typed){
  // 공백 제거 후 기본 startsWith
  if(target.startsWith(typed)) return {match:true, complete:typed.length};
  // 조합 중인 마지막 글자 고려: typed의 마지막 글자가 target 같은 위치의 음절을 "만들어가는 중"인지
  if(typed.length===0) return {match:true, complete:0};
  const lastIdx=typed.length-1;
  const prefix=typed.slice(0,lastIdx);
  if(!target.startsWith(prefix)) return {match:false, complete:0};
  const targetChar=target[lastIdx];
  const typedChar=typed[lastIdx];
  if(!targetChar) return {match:false, complete:0};
  // 같은 초성으로 시작하는 조합 중 글자는 허용
  const targetCho=getChoseong(targetChar);
  const typedCho=getChoseong(typedChar);
  if(targetCho && typedCho && targetCho===typedCho){
    return {match:true, complete:prefix.length}; // 마지막은 아직 미완성
  }
  return {match:false, complete:0};
}
function getChoseong(ch){
  const code=ch.charCodeAt(0);
  // 완성형 한글 (가~힣)
  if(code>=0xAC00 && code<=0xD7A3){
    const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    return CHO[Math.floor((code-0xAC00)/588)];
  }
  // 자모 단독 (ㄱ, ㄴ 등 조합 시작 상태)
  if(code>=0x3131 && code<=0x314E) return ch;
  return null;
}

function processTypingProgress(rawValue){
  if(!bossEvent||!bossEvent.active||bossEvent.mode!=='typing')return;
  const now=performance.now();
  if(now<(bossEvent.previewUntil||0))return;
  const target=normalizeTypingText(bossEvent.targetText);
  const typed=normalizeTypingText(rawValue);
  if(typed===''){bossEvent.typedText='';return;}

  const check=isHangulPrefixMatch(target, typed);
  if(check.match){
    // "확정된 글자 수"만 진행으로 인정 (조합 중 마지막 글자는 제외)
    const prevLen=bossEvent.typedText?normalizeTypingText(bossEvent.typedText).length:0;
    const confirmedLen=check.complete;
    const delta=confirmedLen-Math.min(prevLen,confirmedLen);
    bossEvent.typedText=typed;
    if(delta>0){
      const perCharGain=GAME_TUNING.BOSS_TYPING_PER_CHAR_GAIN;
      bossEvent.pushProgress=Math.min(1,bossEvent.pushProgress+perCharGain*delta);
      A.bossMash();
    }
    if(typed===target){
      bossEvent.wordIndex++;
      bossEvent.pushProgress=Math.min(1,bossEvent.pushProgress+GAME_TUNING.BOSS_TYPING_COMPLETE_BONUS);
      if(bossEvent.wordIndex>=bossEvent.words.length){
        bossEvent.words=pickTypingSet();
        bossEvent.wordIndex=0;
      }
      bossEvent.targetText=bossEvent.words[bossEvent.wordIndex];
      bossEvent.previewUntil=now+GAME_TUNING.BOSS_PREVIEW_MS;
      bossEvent.typedText='';
      typingInput.value='';
    }
  }else if(!isComposingHangul){
    // 조합이 완전히 끝난 상태에서만 오타 판정
    bossEvent.mistakes++;
    bossEvent.pushProgress=Math.max(0,bossEvent.pushProgress-GAME_TUNING.BOSS_TYPING_MISTAKE_PENALTY);
    typingInput.value='';
    bossEvent.typedText='';
  }
  // 조합 중 불일치: 아무것도 하지 않음 (사용자가 조합 계속하도록)
}
function triggerBoss(type){
  const isTypingMode=playMode==='office';
  const now=performance.now();
  bossEvent={type,active:true,startTime:now,duration:GAME_TUNING.BOSS_DURATION,
    pushProgress:isTypingMode?GAME_TUNING.BOSS_TYPING_START_PROGRESS:0.5,mashCount:0,resultTimer:0,result:null,
    mode:isTypingMode?'typing':'mash',mistakes:0,previewUntil:isTypingMode?now+GAME_TUNING.BOSS_PREVIEW_MS:0};
  if(isTypingMode){
    const kb=document.getElementById('kbBtn');if(kb)kb.style.display='';
    bossEvent.words=pickTypingSet();
    bossEvent.wordIndex=0;
    bossEvent.targetText=bossEvent.words[0];
    bossEvent.typedText='';
    typingInput.value='';
    // 모바일 IME 활성화를 위해 input을 DOM flow로 잠시 복귀
    typingInput.style.pointerEvents='auto';
    focusTypingInput();
    setTimeout(focusTypingInput,30);
    setTimeout(focusTypingInput,120);
    setTimeout(focusTypingInput,300);
  }
  cars=[];items=[];lights=[];shelters=[];smokes=[];mission=null;spawnTimer=60;A.speedup();
}
function updateBoss(dt,now){
  if(!bossEvent||!bossEvent.active)return;
  const previewing=bossEvent.mode==='typing'&&now<(bossEvent.previewUntil||0);
  const remaining=bossRemainingMs(now);
  const decay=bossEvent.mode==='typing'?GAME_TUNING.BOSS_TYPING_DECAY:BOSS_DECAY;
  if(!previewing){
    bossEvent.pushProgress-=decay*16.67*dt;
    bossEvent.pushProgress=Math.max(0,Math.min(1,bossEvent.pushProgress));
  }
  // focus는 blur 이벤트에서만 복구, 매 프레임 강탈 금지 (한글 조합 보존)
  if(bossEvent.pushProgress>=BOSS_WIN_THRESHOLD){endBoss('win');return;}
  if(bossEvent.pushProgress<=0){endBoss('fail');return;}
  if(remaining<=0){endBoss(bossEvent.pushProgress>=0.55?'win':'fail');return;}
}
function endBoss(result){
  const kb=document.getElementById('kbBtn');if(kb)kb.style.display='none';
  if(!bossEvent)return;
  bossEvent.active=false;bossEvent.result=result;bossEvent.resultTimer=160;
  const now=performance.now();
  typingInput.value='';
  typingInput.style.pointerEvents='none';
  try{typingInput.blur();}catch(e){}
  if(result==='win'){A.grade('S');setScore(score+10);}
  else{hp=Math.max(0,hp-35);if(hp<=0){hp=0;updateHP();doGameOver();return;}}
  postMissionInvulTime=now+1500;updateHP();
}

/* =========================================================  ROAD BASE  */
function drawRoadBase(st){
  ctx.fillStyle=st.roadCol;ctx.fillRect(0,ROAD_TOP,W,ROAD_BOT-ROAD_TOP);
  // Center dashes
  const mid=(ROAD_TOP+ROAD_BOT)/2;
  ctx.fillStyle=st.midLineCol;
  for(let x=-((scroll*1.5)%52);x<W;x+=52)ctx.fillRect(x,mid-1.5,28,3);
  // Edge lines
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(0,ROAD_TOP,W,2);ctx.fillRect(0,ROAD_BOT-2,W,2);
  // Sidewalk
  ctx.fillStyle=st.sidewalkCol;ctx.fillRect(0,ROAD_BOT,W,H-ROAD_BOT);
  ctx.strokeStyle=st.sidewalkLine;ctx.lineWidth=1;
  for(let x=-((scroll*1.2)%40);x<W+40;x+=40){ctx.beginPath();ctx.moveTo(x,ROAD_BOT);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=ROAD_BOT+20;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

/* =========================================================  BACKGROUNDS  */
function drawSkyGrad(colors){
  const grad=ctx.createLinearGradient(0,0,0,ROAD_TOP);
  colors.forEach((c,i)=>grad.addColorStop(i/(colors.length-1),c));
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,ROAD_TOP);
}
function drawStars(density,speed){
  for(let i=0;i<density;i++){
    const sx=((i*127+scroll*speed)%(W+20))%W,sy=3+((i*43)%55);
    const tw=0.4+0.6*Math.abs(Math.sin(frame*.08+i*1.3));
    ctx.fillStyle=`rgba(255,255,255,${tw*.7})`;
    ctx.beginPath();ctx.arc(sx,sy,0.8+i%2*.5,0,Math.PI*2);ctx.fill();
  }
}

function drawBG_cityhall(){
  const st=currentStage();
  drawSkyGrad(st.sky);
  drawStars(20,.015);

    for(let wy=ROAD_TOP-bh+4;wy<ROAD_TOP-4;wy+=8){
      for(let wx=bx+5;wx<bx+80;wx+=12){
        if((i+Math.floor(wy/8)+Math.floor(wx/12))%3!==0)continue;
        ctx.fillStyle=st.winCol;ctx.globalAlpha=.18+.18*Math.abs(Math.sin(frame*.02+i+wy*.1));
        ctx.fillRect(wx,wy,7,5);
      }
    }
    ctx.globalAlpha=1;
  }
  // City hall
  // 파이널 진행도에 따라 시청이 화면 중앙쪽으로 이동 (200점→오른쪽, 260점→중앙 근처)
  const finalProgress=Math.max(0,Math.min(1,(score-STAGES[3].scoreEnd)/60));
  const cityHallX=W-80-finalProgress*360;
  const chScale=0.5+Math.min(1,Math.max(0,(score-STAGES[3].scoreEnd)/80));
  ctx.globalAlpha=Math.min(1,.3+chScale*.8);
  const chw=Math.round(120*chScale),chh=Math.round(55*chScale),cx=Math.max(50,cityHallX);
  const chGrad=ctx.createLinearGradient(cx,ROAD_TOP-chh,cx,ROAD_TOP);
  chGrad.addColorStop(0,'#0e1c4a');chGrad.addColorStop(1,'#060e24');
  ctx.fillStyle=chGrad;
  ctx.beginPath();ctx.moveTo(cx,ROAD_TOP);ctx.lineTo(cx,ROAD_TOP-chh);
  ctx.bezierCurveTo(cx+chw*.3,ROAD_TOP-chh-10,cx+chw*.7,ROAD_TOP-chh-10,cx+chw,ROAD_TOP-chh);
  ctx.lineTo(cx+chw,ROAD_TOP);ctx.closePath();ctx.fill();
  if(chScale>0.6){
    ctx.fillStyle=`rgba(96,165,250,${(chScale-.6)*2.5})`;
    ctx.font='bold 700 8px "Noto Sans KR",sans-serif';ctx.textAlign='center';
    ctx.fillText('서울특별시청',cx+chw/2,ROAD_TOP-chh-7);
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
  drawRoadBase(st);
}

function drawTrafficLight(x,isRed){
  // Pole
  ctx.fillStyle='#374151';ctx.fillRect(x-3,32,6,ROAD_TOP-32);
  // Box
  uiCard(x-14,28,28,46,6,'#1f2937');

  ctx.fillStyle=isRed?'#ef4444':'#2d0a0a';
  ctx.beginPath();ctx.arc(x,46,8,0,Math.PI*2);ctx.fill();
  if(isRed){
    ctx.fillStyle=`rgba(239,68,68,${.25+.2*Math.sin(frame*.15)})`;ctx.beginPath();ctx.arc(x,46,15,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x-3,43);ctx.lineTo(x+3,49);ctx.moveTo(x+3,43);ctx.lineTo(x-3,49);ctx.stroke();
  }

  ctx.fillStyle=!isRed?'#22c55e':'#052e0a';
  ctx.beginPath();ctx.arc(x,63,8,0,Math.PI*2);ctx.fill();
  if(!isRed){
    ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.beginPath();ctx.moveTo(x,58);ctx.lineTo(x-4,64);ctx.lineTo(x+4,64);ctx.closePath();ctx.fill();

  ctx.fillStyle=blink?(isRed?'rgba(239,68,68,.6)':'rgba(34,197,94,.6)'):'rgba(255,255,255,.1)';

function drawShelter(sh){
  const x=sh.x,w=sh.width;const active=sh.active;
  // 구조: 인도 위 스마트쉼터. 흡연부스와 같은 디자인 언어 (기단 + 유리벽 + 간판 + 네온).
  const shY=H-8;                        // 하단 기준
  const shH=62;                         // 부스 전체 높이
  const sx=x+8,sw=w-16,sy=shY-shH;      // 몸체 박스
  // 기단/바닥
  ctx.fillStyle='#1e293b';ctx.fillRect(x+2,shY-4,w-4,6);
  ctx.fillStyle='#475569';ctx.fillRect(x+2,shY-4,w-4,2);
  // 기둥 (좌/우)
  ctx.fillStyle='#334155';
  ctx.fillRect(sx,sy+14,5,shH-14);
  ctx.fillRect(sx+sw-5,sy+14,5,shH-14);
  // 유리 벽 (반투명 그린 틴트 — 쉼터 정체성)
  const glassCol=active?'rgba(134,239,172,.38)':'rgba(148,188,170,.28)';
  ctx.fillStyle=glassCol;
  ctx.fillRect(sx+5,sy+14,sw-10,shH-14);
  // 유리창 하이라이트
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.beginPath();
  ctx.moveTo(sx+10,sy+18);ctx.lineTo(sx+26,sy+18);
  ctx.lineTo(sx+10,sy+34);ctx.closePath();ctx.fill();
  // 유리창 세로 분할 프레임
  ctx.strokeStyle='rgba(71,85,105,.8)';ctx.lineWidth=1.5;
  for(let i=1;i<3;i++){
    const fx=sx+sw*i/3;
    ctx.beginPath();ctx.moveTo(fx,sy+14);ctx.lineTo(fx,shY-4);ctx.stroke();
  }
  // 상단 가로 프레임
  ctx.fillStyle='#0f172a';ctx.fillRect(sx,sy+6,sw,10);
  // 초록색 간판(지붕) — 쉼터
  const signCol=active?'#16a34a':'#15803d';
  ctx.fillStyle=signCol;ctx.fillRect(sx-4,sy-10,sw+8,16);
  ctx.fillStyle='#14532d';ctx.fillRect(sx-4,sy+2,sw+8,4);
  // 간판 글자
  ctx.fillStyle='#fff';ctx.font='bold 900 12px "Noto Sans KR",sans-serif';
  ctx.textAlign='center';
  ctx.fillText(sh.label||'스마트쉼터',sx+sw/2,sy+1);
  // 벤치 픽토그램
  ctx.fillStyle='#fff';ctx.fillRect(sx+6,sy-7,14,2);
  ctx.fillRect(sx+7,sy-5,2,3);ctx.fillRect(sx+17,sy-5,2,3);
  // SMART SHELTER 서브 태그
  ctx.fillStyle='rgba(22,78,52,.95)';ctx.font='bold 700 8px "Space Grotesk",sans-serif';
  ctx.fillText('SMART SHELTER',sx+sw/2,shY-6);
  // 하단 네온 라이트
  const neon=active?(.6+.3*Math.sin(frame*.18)):(.3+.12*Math.sin(frame*.08));
  ctx.fillStyle=`rgba(74,222,128,${neon})`;
  ctx.fillRect(sx-4,shY-4,sw+8,1);
  // 활성 상태: 초록 파티클 상승
  if(active){
    for(let i=0;i<6;i++){
      const pt=(frame*2+i*20)%70;
      ctx.fillStyle=`rgba(74,222,128,${1-pt/70})`;
      const px=sx+sw/2+Math.sin(frame*.05+i)*(sw/3);
      ctx.fillRect(px,shY-pt-4,3,3);
    }
    // 활성 바닥 글로우
    ctx.fillStyle=`rgba(74,222,128,${.25+.15*Math.sin(frame*.15)})`;
    ctx.fillRect(x,shY-2,w,3);
  }
  ctx.textAlign='left';
}

function drawSmoker(x,f,hasBooth){
  // 인도(ROAD_BOT=190 ~ H=260) 하단 기준. 쉼터처럼 지붕만 도로를 살짝 침범.
  const y=H-10; // 인도 바닥 근처
  if(hasBooth){
    // ========== 부스 있음: 스마트 흡연부스 (인도 위) ==========
    const boothW=86,boothH=64,bx=x-43,by=y-boothH;
    // 기단/바닥
    ctx.fillStyle='#1e293b';ctx.fillRect(bx-6,y-3,boothW+12,6);
    ctx.fillStyle='#475569';ctx.fillRect(bx-6,y-3,boothW+12,2);
    // 기둥 4개 (코너)
    ctx.fillStyle='#334155';
    ctx.fillRect(bx,by,5,boothH);
    ctx.fillRect(bx+boothW-5,by,5,boothH);
    // 유리 벽 (반투명 하늘색)
    ctx.fillStyle='rgba(125,211,252,.32)';
    ctx.fillRect(bx+5,by+8,boothW-10,boothH-8);
    // 유리창 하이라이트
    ctx.fillStyle='rgba(255,255,255,.18)';
    ctx.beginPath();
    ctx.moveTo(bx+10,by+12);ctx.lineTo(bx+30,by+12);
    ctx.lineTo(bx+10,by+32);ctx.closePath();ctx.fill();
    // 유리창 프레임 (세로 분할)
    ctx.strokeStyle='rgba(71,85,105,.8)';ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(bx+boothW/2,by+8);ctx.lineTo(bx+boothW/2,y-2);
    ctx.stroke();
    // 상단 가로 프레임
    ctx.fillStyle='#0f172a';ctx.fillRect(bx,by,boothW,10);
    // 파란색 간판(지붕)
    ctx.fillStyle='#0284c7';ctx.fillRect(bx-4,by-14,boothW+8,16);
    ctx.fillStyle='#0369a1';ctx.fillRect(bx-4,by-2,boothW+8,4);
    // 간판 글자
    ctx.fillStyle='#fff';ctx.font='bold 900 11px "Noto Sans KR",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('흡연부스',bx+boothW/2,by-3);
    // 담배 아이콘
    ctx.fillStyle='#fff';ctx.fillRect(bx+4,by-11,14,3);
    ctx.fillStyle='#ff6b35';ctx.fillRect(bx+16,by-11,3,3);
    // SMART BOOTH 글자
    ctx.fillStyle='rgba(30,41,59,.9)';ctx.font='bold 700 8px "Space Grotesk",sans-serif';
    ctx.fillText('SMART BOOTH',bx+boothW/2,y-6);
    // 네온 하단 라이트
    const neon=.5+.3*Math.sin(f*.1);
    ctx.fillStyle=`rgba(56,189,248,${neon})`;
    ctx.fillRect(bx-4,y-2,boothW+8,1);
    ctx.textAlign='left';

    // 흡연자 (부스 안, 실루엣)
    const sx=bx+22;
    ctx.globalAlpha=.8;
    ctx.strokeStyle='#6b7280';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx,y-12);ctx.lineTo(sx-4,y-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,y-12);ctx.lineTo(sx+4,y-3);ctx.stroke();
    ctx.fillStyle='#4b5563';ctx.fillRect(sx-7,y-28,14,16);
    ctx.fillStyle='#d4b896';ctx.beginPath();ctx.arc(sx,y-34,7,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#4b5563';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx+5,y-24);ctx.lineTo(sx+14,y-20);ctx.stroke();
    ctx.strokeStyle='#e5e7eb';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx+14,y-20);ctx.lineTo(sx+22,y-17);ctx.stroke();
    ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(sx+22,y-17,2.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // 연기 — 부스 천장까지만
    for(let i=0;i<4;i++){
      const rise=(f*1.1+i*16)%40;
      const drift=Math.sin(f*.05+i*1.2)*4;
      const r=2.5+rise*.1;
      ctx.globalAlpha=Math.max(0,.45-rise/40);
      ctx.fillStyle='rgba(209,213,219,1)';
      ctx.beginPath();
      const smokeX=sx+18+drift;
      if(smokeX>bx+7&&smokeX<bx+boothW-7){
        ctx.arc(smokeX,y-20-rise,r,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }else{
    // ========== 부스 없음: 노상 흡연자 ==========
    // 경고 원뿔
    ctx.fillStyle='#f97316';
    ctx.beginPath();
    ctx.moveTo(x-15,y-2);ctx.lineTo(x+15,y-2);ctx.lineTo(x,y-22);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(x-1,y-16,2,8);
    ctx.fillRect(x-1,y-6,2,2);
    // 노상 흡연자
    const sx=x;
    ctx.strokeStyle='#64748b';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx,y-12);ctx.lineTo(sx-5,y-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,y-12);ctx.lineTo(sx+5,y-2);ctx.stroke();
    ctx.fillStyle='#6b7280';ctx.fillRect(sx-8,y-30,16,18);
    ctx.fillStyle='#f3d5a5';ctx.beginPath();ctx.arc(sx,y-36,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#6b7280';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx+6,y-25);ctx.lineTo(sx+18,y-20);ctx.stroke();
    ctx.strokeStyle='#e5e7eb';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx+18,y-20);ctx.lineTo(sx+28,y-16);ctx.stroke();
    ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(sx+28,y-16,3,0,Math.PI*2);ctx.fill();

    // 연기 크고 멀리
    for(let i=0;i<7;i++){
      const rise=(f*1.5+i*18)%90;
      const drift=Math.sin(f*.06+i*1.3)*12;
      const r=5+rise*.15;
      ctx.globalAlpha=Math.max(0,.65-rise/90);
      ctx.fillStyle='rgba(160,160,155,1)';
      ctx.beginPath();ctx.arc(sx+28+drift,y-18-rise,r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // 경고 말풍선
    const warn=Math.sin(f*.12)>0;
    if(warn){
      uiCard(x-32,y-72,64,16,4,'rgba(249,115,22,.92)');
      ctx.fillStyle='#fff';ctx.font='bold 800 9px "Noto Sans KR",sans-serif';
      ctx.textAlign='center';
      ctx.fillText('노상 흡연',x,y-61);
      ctx.textAlign='left';
    }
  }
}

// 정책별 심볼 드로잉 (단순 글자가 아닌 정책을 직관적으로 드러내는 아이콘)
function drawPolicyIcon(p, x, y){
  ctx.save();
  ctx.translate(x,y);
  switch(p.type){
    case 'bus': // 버스 아이콘
      ctx.fillStyle='#fff';ctx.fillRect(-8,-5,16,9);
      ctx.fillStyle='#bfdbfe';ctx.fillRect(-6,-3,4,3);ctx.fillRect(-1,-3,4,3);ctx.fillRect(4,-3,3,3);
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-5,4,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(5,4,1.5,0,Math.PI*2);ctx.fill();break;
    case 'banjiha': // 집 + 아래 사다리
      ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(-7,-1);ctx.lineTo(0,-7);ctx.lineTo(7,-1);ctx.lineTo(7,5);ctx.lineTo(-7,5);ctx.closePath();ctx.fill();
      ctx.fillStyle=p.col;ctx.fillRect(-2,0,4,5);break;
    case 'smart': case 'gentri':
      // 지붕형 쉼터
      ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(-8,2);ctx.lineTo(0,-6);ctx.lineTo(8,2);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(-6,2,2,5);ctx.fillRect(4,2,2,5);break;
    case 'wage': case 'score10': case 'care2': case 'aiAdmin': case 'tour':
      // ₩ 기호
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.font='bold 900 13px sans-serif';ctx.textAlign='center';ctx.fillStyle='#fff';
      ctx.fillText('₩',0,5);break;
    case 'smoke':
      // 연기 3개 동그라미
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-4,2,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(2,-1,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(5,4,2.5,0,Math.PI*2);ctx.fill();break;
    case 'care':
      // 십자 의료
      ctx.fillStyle='#fff';ctx.fillRect(-2,-7,4,14);ctx.fillRect(-7,-2,14,4);break;
    case 'youth':
      // 열쇠
      ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(-3,0,3,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#fff';ctx.fillRect(0,-1,8,2);ctx.fillRect(6,-1,2,4);break;
    case 'tree':
      // 나무
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-2,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#78350f';ctx.fillRect(-1,3,2,5);break;
    case 'startup':
      // 로켓
      ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(4,0);ctx.lineTo(4,4);ctx.lineTo(-4,4);ctx.lineTo(-4,0);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ef4444';ctx.beginPath();ctx.moveTo(-4,4);ctx.lineTo(-6,7);ctx.lineTo(-2,6);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(4,4);ctx.lineTo(6,7);ctx.lineTo(2,6);ctx.closePath();ctx.fill();break;
    case 'permit':
      // 도장/스탬프
      ctx.fillStyle='#fff';ctx.fillRect(-6,-4,12,8);
      ctx.fillStyle=p.col;ctx.font='bold 900 8px sans-serif';ctx.textAlign='center';ctx.fillText('허가',0,2);break;
    case 'pipe':
      // 파이프
      ctx.fillStyle='#fff';ctx.fillRect(-8,-2,16,4);
      ctx.fillStyle='#fff';ctx.fillRect(-2,-6,4,12);break;
    case 'safety':
      // 방패
      ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(6,-4);ctx.lineTo(6,2);ctx.lineTo(0,7);ctx.lineTo(-6,2);ctx.lineTo(-6,-4);ctx.closePath();ctx.fill();
      ctx.strokeStyle=p.col;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-2,0);ctx.lineTo(-0.5,2);ctx.lineTo(3,-2);ctx.stroke();break;
    case 'fraudHelp':
      // 집 + 체크
      ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(-7,2);ctx.lineTo(0,-5);ctx.lineTo(7,2);ctx.lineTo(7,6);ctx.lineTo(-7,6);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-3,2);ctx.lineTo(-1,4);ctx.lineTo(3,0);ctx.stroke();break;
    default:
      ctx.fillStyle='#fff';ctx.font='bold 900 10px sans-serif';ctx.textAlign='center';ctx.fillText('★',0,4);
  }
  ctx.restore();
  ctx.textAlign='left';
}

/* =========================================================  SPAWN LOGIC  */
function getRightmostEventX(forType){
  let maxX=0;
  cars.forEach(c=>{maxX=Math.max(maxX,c.x+52);});
  items.forEach(it=>{if(!it.collected){const bonus=(forType==='car')?Math.max(0,(carSpd()-spd())*60):0;maxX=Math.max(maxX,it.x+28+bonus);}});
  lights.forEach(l=>{if(!l.consumed)maxX=Math.max(maxX,l.x+20);});
  shelters.forEach(sh=>{maxX=Math.max(maxX,sh.x+sh.width);});
  smokes.forEach(z=>{maxX=Math.max(maxX,z.x+z.width);});
  return maxX;
}
// 수정 후
let lastSpawnType=null;
function pickEventType(){
  const w=GAME_TUNING.SPAWN_WEIGHTS;
  for(let tries=0;tries<3;tries++){
    const r=Math.random()*100;
    let t;
    if(r<w.car)t='car';
    else if(r<w.car+w.item)t='item';
    else if(r<w.car+w.item+w.light)t='light';
    else t='smoke';
    // 흡연부스가 2번 연속이면 재추첨
    if(t==='smoke'&&lastSpawnType==='smoke')continue;
    lastSpawnType=t;
    return t;
  }
  lastSpawnType='car';
  return'car';
}
let carClusterRemaining=0;          // 남은 클러스터 차 수
let carClusterCooldownUntil=0;      // 시간 기준 쿨다운(ms, performance.now 기준)
function spawnEvent(){
  let type=pickEventType();
  const now=performance.now();

  if(type==='item'&&now-lastItemSpawnAt<GAME_TUNING.ITEM_SPAWN_COOLDOWN){
    type=Math.random()<0.6?'car':'smoke';
  }

  const rightmost=getRightmostEventX(type);

  // 반응시간 기반 추가 간격(px) — 단, 최대값을 캡해서 화면 밖 무한 뒤로 가지 않도록
  const reactionGap=Math.min(420,(spd()*60)*(GAME_TUNING.MIN_REACTION_MS/1000));

  let extraGap=0;
  if(type==='item'){
    extraGap=GAME_TUNING.ITEM_EXTRA_GAP;
  }else if(type==='car'){
    // 시간 기반 쿨다운: 클러스터 직후 잠시 차 스폰 스킵
    if(now<carClusterCooldownUntil){
      // smoke로 대체하지 말고, 이번 스폰 자체를 취소(다음 틱에 재시도)
      return;
    }else if(carClusterRemaining>0){
      // 클러스터 내부: 짧은 간격(작거나 0 허용)
      extraGap=Math.max(-60,GAME_TUNING.CAR_CLUSTER_GAP-EVENT_GAP.car);
      carClusterRemaining--;
      if(carClusterRemaining===0){
        carClusterCooldownUntil=now+GAME_TUNING.CAR_CLUSTER_COOLDOWN;
      }
    }else{
      // 일반 차량: 반응시간 기반 + 랜덤 변동(캡 적용)
      extraGap=Math.max(0,reactionGap-EVENT_GAP.car)+Math.floor(Math.random()*180);
      // 클러스터 시작 확률
      if(Math.random()<GAME_TUNING.CAR_CLUSTER_CHANCE){
        carClusterRemaining=1+Math.floor(Math.random()*2); // 2~3대
      }
    }
  }else{
    // 차 이외 장애물: 반응시간 절반만 반영(캡 적용 후라 안전)
    extraGap=Math.max(0,reactionGap*0.4-EVENT_GAP[type]);
  }

  // spawnX 자체도 화면 오른쪽에서 너무 멀어지지 않게 하드 캡
  const spawnX=Math.min(W+900,Math.max(W+30,rightmost+EVENT_GAP[type]+extraGap));

  if(type==='car'){
    // 빨간 신호등 주변 220px 버퍼에는 차 스폰 금지 — 미션 중 충돌 방지
    const blocked=lights.some(l=>!l.consumed&&l.red&&Math.abs(l.x-spawnX)<220);
    if(blocked){spawnTimer=20;return;}
    const cols=['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6'];
    cars.push({x:spawnX,color:cols[Math.floor(Math.random()*cols.length)]});
  }
  else if(type==='item'){
    const policy=pickPolicy();
    const yOff=GAME_TUNING.ITEM_Y_MIN+Math.floor(Math.random()*(GAME_TUNING.ITEM_Y_MAX-GAME_TUNING.ITEM_Y_MIN));
    items.push({x:spawnX,y:GY-yOff,policy,collected:false});
    lastItemSpawnAt=now;
  }
  else if(type==='light'){
    let lx=spawnX;
    // 근거리(±180px) 차량이 있으면 신호등을 더 뒤로 밀어 안전거리 확보
    cars.forEach(c=>{if(Math.abs(c.x-lx)<180)lx=Math.max(lx,c.x+220);});
    lights.push({x:lx,red:Math.random()<0.7,consumed:false,isCurrentRed:false});
  }
  else if(type==='shelter'){
    shelters.push({x:spawnX,width:160,active:false,consumed:false});
  }
  else{
    const w=140+Math.random()*60; // 160~200
    // 50% 확률로 부스 있음(안전), 50% 확률로 노상(시야 제한)
    const hasBooth=Math.random()<0.5;
    smokes.push({x:spawnX,width:w,alpha:0,smokerX:spawnX+30,hasBooth:hasBooth,bonusGiven:false});
  }
}


function maybeSpawnStageShelters(){
  // 스테이지당 쉼터 1개만, 60% 지점에 배치
  const st=currentStage();
  const stageStart=stageIdx===0?0:STAGES[stageIdx-1].scoreEnd;
  const stageEnd=st.scoreEnd;
  const progressMax=Math.max(1,stageEnd-stageStart);
  const stageProgress=Math.max(0,score-stageStart);
  const threshold=Math.floor(progressMax*0.6);
  if(shelterMilestonesHit[0])return;
  if(stageProgress<threshold)return;
  // 안전거리: 화면 오른쪽에 다른 장애물이 없을 때만
  const rightmost=getRightmostEventX();
  const spawnX=Math.max(W+240,rightmost+220);
  shelters.push({x:spawnX,width:160,active:false,consumed:false,fixed:true,label:'스마트쉼터'});
  shelterMilestonesHit[0]=true;
}

function endMission(){
  if(!mission)return;
  const now=performance.now();
  if(mission.type==='red'){
    const j=mission.judgement||'FAIL'; // 미탭 시 FAIL
    let bon=0;
    if(j==='PERFECT'){bon=8;A.grade('S');}
    else if(j==='GOOD'){bon=4;A.grade('A');}
    else if(j==='OK'){bon=1;A.grade('B');}
    else{bon=0;hp=Math.max(0,hp-RED_FAIL_HP_PENALTY);A.hit();}
    mission.bonusScore=bon;mission.gradeTimer=140;
    if(bon>0)setScore(score+bon);
    updateHP();
    if(hp<=0){hp=0;updateHP();doGameOver();return;}
    if(mission.lightRef){mission.lightRef.consumed=true;mission.lightRef.isCurrentRed=false;}
  } else if(mission.type==='shelter'){
    const heal=Math.min(100-hp,mission.mashCount*3);
    hp=Math.min(100,hp+heal);mission.healAmount=heal;mission.gradeTimer=120;A.heal();updateHP();
    if(mission.shelterRef)mission.shelterRef.consumed=true;
  }
  mission={...mission,active:false};postMissionInvulTime=now+400;
}

/* =========================================================  UPDATE  */
function update(dt=1){
  if(phase!=='playing')return;
  frame++;
  const now=performance.now();
  const bannerFreeze=now<stageBannerEndTime;
  const postInvulActive=now<postMissionInvulTime;
  const busActive=now<busBoostEndTime;
  if(!busActive&&busBoostActive)busBoostActive=false;
  const inMission=mission&&mission.active;
  const realS=spd()*dt;
  const s=(inMission?0:spd())*dt;
  scroll+=s;
  if(sirenTimer>0)sirenTimer--;
  if(stageIdx===STAGES.length-1&&score>=STAGES[STAGES.length-1].scoreEnd){doEnding();return;}
  P.vy+=0.65*dt;P.y+=P.vy*dt;
  if(P.y>=GY){P.y=GY;P.vy=0;P.jumpCount=0;}
  if(inMission){
    const elapsed=now-mission.startTime;mission.timeLeft=mission.duration-elapsed;
    // 빨간불: 탭은 handleSpace에서 즉시 endMission 처리. 여기서는 타임아웃만.
    if(mission.timeLeft<=0){
      mission.timeLeft=0;endMission();
    }
  }
  if(mission&&!mission.active&&mission.gradeTimer>0){mission.gradeTimer-=dt;if(mission.gradeTimer<=0)mission=null;}
  const atRed=inMission&&mission.type==='red';
  const atShelter=inMission&&mission.type==='shelter';
  const allFrozen=bannerFreeze||atRed||atShelter;
  const spawnFrozen=bannerFreeze||atRed||atShelter;
  if(!bossEvent&&!allFrozen){
    const st=currentStage();const bossKey=stageIdx;const bossTriggerScore=st.scoreEnd-8;
    // 마지막 스테이지에도 보스 등장 (최종 보스: 관료주의)
    if(!bossFiredSet.has(bossKey)&&score>=bossTriggerScore){
      bossFiredSet.add(bossKey);const bossTypes=['construction','redevelop','fraud','flood','bureaucrat'];
      triggerBoss(bossTypes[st.id]||'bureaucrat');
    }
  }
  if(bossEvent&&bossEvent.active){
    updateBoss(dt,now);scroll+=1.5*dt;if(invul>0)invul-=dt;
    P.vy+=0.65*dt;P.y+=P.vy*dt;if(P.y>=GY){P.y=GY;P.vy=0;P.jumpCount=0;}return;
  }
  if(bossEvent&&!bossEvent.active&&bossEvent.resultTimer>0){
    bossEvent.resultTimer-=dt;scroll+=1.5*dt;if(bossEvent.resultTimer<=0)bossEvent=null;return;
  }
  if(!spawnFrozen){
    spawnTimer-=dt;
    if(spawnTimer<=0){
      const rightmost=getRightmostEventX();
      // 차가 한동안 없었다면 조건 완화 (화면이 비는 것 방지)
      const noCars=cars.length===0;
      const threshold=noCars?W+700:W+400;
      if(rightmost<threshold)spawnEvent();;
      spawnTimer=Math.max(10,22+Math.random()*18-Math.min(20,score*0.14));
    }
    // 스테이지 1/3, 2/3 지점에 쉼터 고정 배치 (README 스펙)
    maybeSpawnStageShelters();
  }
  if(!allFrozen){
    cars.forEach(c=>{
      c.x-=carSpd()*dt;
      if(busActive&&!c.pushed&&Math.abs(c.x+26-P.x)<40){c.pushed=true;c.pushVy=-8;setScore(score+2);A.point();}
      if(c.pushed){c.x+=6*dt;c.pushVy=(c.pushVy||0)+0.5*dt;c.pushY=(c.pushY||0)+c.pushVy*dt;}
    });
  }
  cars=cars.filter(c=>c.x>-70);
  if(!allFrozen)items.forEach(it=>{if(!it.collected)it.x-=s;});
  items=items.filter(it=>it.x>-40&&!it.collected);
  if(!allFrozen)lights.forEach(l=>{if(!l.consumed)l.x-=realS;});
  lights=lights.filter(l=>l.x>-80);
  if(!inMission&&!atRed){
    for(const l of lights){
      if(l.consumed||l.isCurrentRed)continue;const dx=l.x-P.x;
      if(l.red&&dx<=55&&dx>=-10){
        l.isCurrentRed=true;
        const waitMs=RED_WAIT_MIN_MS+Math.random()*(RED_WAIT_MAX_MS-RED_WAIT_MIN_MS);
        mission={
          type:'red',active:true,startTime:now,
          waitMs:waitMs,
          duration:waitMs+RED_WINDOW_MS,
          timeLeft:waitMs+RED_WINDOW_MS,
          tapped:false,tapTime:0,judgement:null,diff:0,
          gradeTimer:0,bonusScore:0,lightRef:l
        };
        // 이미 플레이어 근처(±80px)에 들어온 차량을 앞으로 밀어냄
        cars.forEach(c=>{
          if(Math.abs(c.x+26-P.x)<80&&!c.pushed){
            c.x=Math.max(c.x,P.x+100);
          }
        });
        // 진입 순간 짧은 무적 (8프레임, 약 130ms)
        invul=Math.max(invul,8);
        break;
      }
      if(!l.red&&dx<-55){l.consumed=true;setScore(score+2);A.point();}
    }
  }
  if(!allFrozen)shelters.forEach(sh=>sh.x-=realS);
  shelters=shelters.filter(sh=>sh.x+sh.width>-50);
  if(!inMission){
    for(const sh of shelters){
      if(sh.consumed)continue;const insideShelter=P.x>=sh.x+6&&P.x<=sh.x+sh.width-6;
      if(insideShelter){
        sh.active=true;
        mission={type:'shelter',active:true,startTime:now,duration:2200,timeLeft:2200,mashCount:0,gradeTimer:0,healAmount:0,shelterRef:sh};
        // 근처 차량 밀어내기 + 짧은 무적
        cars.forEach(c=>{
          if(Math.abs(c.x+26-P.x)<80&&!c.pushed){
            c.x=Math.max(c.x,P.x+100);
          }
        });
        invul=Math.max(invul,8);
        break;
      }
    }
  }
  if(!allFrozen)smokes.forEach(z=>{z.x-=s;z.smokerX-=s;});
  smokes=smokes.filter(z=>z.x+z.width>0);
  for(const z of smokes){
    const inZ=P.x>=z.x-10&&P.x<=z.x+z.width+10;
    if(inZ){
      // 부스 있으면 연기 안 새어나감(낮은 알파), 부스 없으면 화면 흐려짐(높은 알파)
      const target=z.hasBooth?.15:.65;
      const rate=z.hasBooth?.02:.035;
      z.alpha=Math.min(target,z.alpha+rate);
      // 부스 통과 보너스 (한 번만)
      if(z.hasBooth&&!z.bonusGiven&&P.x>=z.x+z.width-30){
        z.bonusGiven=true;setScore(score+3);A.point();
      }
    }else{
      z.alpha=Math.max(0,z.alpha-.05);
    }
  }
  const inShelter=shelters.some(sh=>sh.active&&!sh.consumed&&P.x>=sh.x+6&&P.x<=sh.x+sh.width-6);
  // 자연 HP 감소: 초당 HP_DRAIN_PER_SEC (60fps 기준 dt=1, 1프레임=16.67ms)
  if(!inMission&&!bannerFreeze&&!inShelter&&!busActive)hp-=GAME_TUNING.HP_DRAIN_PER_SEC*dt/60;
  if(hp<=0){hp=0;updateHP();doGameOver();return;}
  updateHP();
  if(invul>0)invul-=dt;
  const fullyInvul=(invul>0)||postInvulActive||bannerFreeze||busActive;
  if(!fullyInvul){
    const pb=playerBox();
    for(const c of cars){if(c.pushed)continue;if(aabbHit(pb,carBox(c))){hp-=22;invul=55;A.hit();if(hp<=0){hp=0;updateHP();doGameOver();return;}break;}}
  }
  const pb2=playerBox();
  for(const it of items){if(!it.collected&&aabbHit(pb2,itemBox(it))){applyPolicyItem(it);break;}}
  if(itemPopup){itemPopup.timer-=dt;if(itemPopup.timer<=0)itemPopup=null;}
  if(frame%40===0&&!inMission&&!bannerFreeze)setScore(score+1);
}

function drawPlaying(){
  if(bossEvent&&bossEvent.active){
    drawBackground();
    if(bossEvent.mode==='typing'){
      const typingTitles={
        fraud:['전세사기 브로커 출현!','공약 타자전으로 피해지원 센터 가동','#818cf8'],
        flood:['폭우 침수!','공약 타자전으로 배수펌프를 돌리세요','#38bdf8'],
        construction:['공사장 먼지 폭풍!','공약 타자전으로 안전감독을 호출하세요','#fb923c'],
        redevelop:['재개발 규제 장벽!','공약 타자전으로 인허가를 뚫으세요','#4ade80'],
        bureaucrat:['관료주의 서류 더미!','공약 타자전으로 AI 행정을 실행하세요','#a78bfa'],
      };
      const meta=typingTitles[bossEvent.type]||typingTitles.fraud;
      drawBossTyping(meta[0],meta[1],'rgba(6,10,24,.92)',meta[2]);
    }else if(bossEvent.type==='fraud')drawBossFraud();
    else if(bossEvent.type==='flood')drawBossFlood();
    else if(bossEvent.type==='construction')drawBossConstruction();
    else if(bossEvent.type==='redevelop')drawBossRedevelop();
    else if(bossEvent.type==='bureaucrat')drawBossBureaucrat();
    else drawBossFraud();
    drawStageBanner();return;
  }
  if(bossEvent&&!bossEvent.active&&bossEvent.resultTimer>0){drawBackground();drawBossResult();return;}

  drawBackground();
  shelters.forEach(sh=>drawShelter(sh));
  lights.forEach(l=>{if(!l.consumed)drawTrafficLight(l.x,l.red);});
  cars.forEach(c=>drawCar(c.x,GY+(c.pushY||0),c.color,c.pushed));
  items.forEach(it=>drawPolicyItem(it));

  // Smoke zones
  // Smoke zones
  for(const z of smokes){
    // 흡연자/부스 구조물은 항상 그림 (alpha 무관) → 멀리서도 "저기 있네" 보임
    if(z.smokerX>-30&&z.smokerX<W+30)drawSmoker(z.smokerX,frame,z.hasBooth);
    if(z.alpha>0){
      if(z.hasBooth){
        // 부스 있음: 화면 안 어두워짐. 살짝 유리 반사 효과만
        ctx.fillStyle=`rgba(125,211,252,${z.alpha*.06})`;ctx.fillRect(0,0,W,H);
      }else{
        // 부스 없음: 화면 흐려짐
        ctx.fillStyle=`rgba(30,30,28,${Math.min(.75,z.alpha)})`;ctx.fillRect(0,0,W,H);
        ctx.fillStyle=`rgba(140,135,125,${z.alpha*.45})`;
        for(let i=0;i<10;i++){const cx=(i*90+frame*1.8)%(W+120)-60;const cy=15+i*24+Math.sin(frame*.04+i)*16;ctx.beginPath();ctx.arc(cx,cy,26+i*5,0,Math.PI*2);ctx.fill();}
        if(z.alpha>0.25){
          ctx.fillStyle=`rgba(255,255,255,${Math.min(1,z.alpha*1.6)})`;
          ctx.font='bold 700 12px "Noto Sans KR",sans-serif';ctx.textAlign='center';
          ctx.fillText('노상 흡연 — 시야 제한',W/2,H/2-10);
          ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='11px "Noto Sans KR",sans-serif';
          ctx.fillText('부스 확대 공약 필요',W/2,H/2+12);ctx.textAlign='left';
        }
      }
    }
  }

  // Bus boost
  const now=performance.now();
  if(now<busBoostEndTime){
    const remaining=busBoostEndTime-now;
    ctx.fillStyle=`rgba(37,99,235,${.12+.06*Math.sin(frame*.3)})`;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=4;ctx.strokeRect(2,2,W-4,H-4);
    // Speed lines
    for(let i=0;i<10;i++){ctx.fillStyle=`rgba(96,165,250,${.25+Math.random()*.2})`;ctx.fillRect(Math.random()*W,GY-5-Math.random()*55,35+Math.random()*35,2);}
    uiCard(W/2-105,ROAD_TOP-22,210,18,6,'rgba(37,99,235,.7)');
    ctx.fillStyle='#93c5fd';ctx.font='bold 700 9px "Noto Sans KR",sans-serif';ctx.textAlign='center';
    ctx.fillText('성공버스 BOOST!  '+(remaining/1000).toFixed(1)+'s',W/2,ROAD_TOP-10);ctx.textAlign='left';
  }
  // Super jump
  if(now<superJumpEndTime){
    const remaining=superJumpEndTime-now;
    ctx.fillStyle=`rgba(14,165,233,${.08+.05*Math.sin(frame*.3)})`;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(14,165,233,.5)';ctx.beginPath();ctx.arc(P.x,P.y-15,13,0,Math.PI*2);ctx.fill();
    uiCard(W/2-90,ROAD_TOP-38,180,16,5,'rgba(14,165,233,.7)');
    ctx.fillStyle='#7dd3fc';ctx.font='bold 700 8px "Noto Sans KR",sans-serif';ctx.textAlign='center';
    ctx.fillText('점프 강화! '+(remaining/1000).toFixed(1)+'s',W/2,ROAD_TOP-26);ctx.textAlign='left';
  }

  // Character
  const blinkOff=(invul>0||(performance.now()<postMissionInvulTime))&&frame%5<2&&!busBoostActive;
  if(!blinkOff){
    if(busBoostActive)drawBusTransform(P.x,P.y);
    else drawJungWonO(P.x,P.y,frame,P.y>=GY-1&&!(mission&&mission.active&&mission.type==='red'));
  }
  // Double jump burst
  if(P.jumpCount===2&&P.vy<0){
    ctx.fillStyle='rgba(251,191,36,.25)';ctx.beginPath();ctx.arc(P.x,P.y-20,18,0,Math.PI*2);ctx.fill();
  }

  // Siren
  if(sirenTimer>0){
    const a=Math.sin(frame*.3)>0?.15:0;
    ctx.fillStyle=`rgba(239,68,68,${a})`;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=`rgba(239,68,68,${a>.05?.8:0})`;ctx.lineWidth=5;ctx.strokeRect(3,3,W-6,H-6);
    if(sirenTimer>60){
      uiCard(W/2-90,ROAD_TOP-22,180,18,6,'rgba(239,68,68,.7)');
      ctx.fillStyle='#fca5a5';ctx.font='bold 700 9px "Noto Sans KR",sans-serif';ctx.textAlign='center';
      ctx.fillText('SPEED UP  Lv.'+speedLevel,W/2,ROAD_TOP-10);ctx.textAlign='left';
    }
  }

  // Red light mission
  const inRedMission=mission&&mission.active&&mission.type==='red';
  if(inRedMission){
    const rm=mission;
    const elapsed=performance.now()-rm.startTime;
    const greenAt=rm.waitMs||RED_WAIT_MIN_MS;
    const beforeGreen=elapsed<greenAt;
    // 배경 틴트
    if(beforeGreen){
      ctx.fillStyle=`rgba(180,0,0,${.08+.05*Math.sin(frame*.2)})`;
    }else{
      ctx.fillStyle=`rgba(0,180,60,${.10+.06*Math.sin(frame*.3)})`;
    }
    ctx.fillRect(0,0,W,H);

    ctx.textAlign='center';
    if(beforeGreen){
      // 빨간불 대기 — 카운트다운 (0.5~1.0초 랜덤)
      const remainSec=Math.max(0,(greenAt-elapsed)/1000);
      ctx.fillStyle='#ef4444';
      ctx.font='bold 900 16px "Noto Sans KR",sans-serif';
      ctx.fillText('빨간불 — 준비',W/2,ROAD_TOP-16);
      ctx.fillStyle='#fca5a5';
      ctx.font='bold 900 52px "Space Grotesk",sans-serif';
      ctx.fillText(remainSec.toFixed(2),W/2,H/2+10);
      ctx.fillStyle='rgba(255,255,255,.6)';
      ctx.font='12px "Noto Sans KR",sans-serif';
      ctx.fillText('초록불 순간을 노려!',W/2,H/2+34);
    }else if(!rm.tapped){
      // 초록불 — 타이밍 창 (0.3초)
      const sinceGreen=elapsed-greenAt;
      const winLeftMs=Math.max(0,RED_WINDOW_MS-sinceGreen);
      ctx.fillStyle='#22c55e';
      ctx.font='bold 900 32px "Noto Sans KR",sans-serif';
      ctx.fillText('GO!',W/2,H/2-6);
      ctx.fillStyle='rgba(255,255,255,.85)';
      ctx.font='bold 700 12px "Noto Sans KR",sans-serif';
      ctx.fillText(Math.round(winLeftMs)+'ms',W/2,H/2+16);
      // 타이밍 게이지 (짧으니 크게)
      const barW=260,barX=W/2-barW/2,barY=H/2+26;
      ctx.fillStyle='rgba(255,255,255,.1)';roundRect(barX,barY,barW,10,5);ctx.fill();
      const fillW=barW*(1-sinceGreen/RED_WINDOW_MS);
      ctx.fillStyle='#22c55e';roundRect(barX,barY,Math.max(0,fillW),10,5);ctx.fill();
    }
    // 화면 상단에 진행 타이머
    const totalPct=Math.max(0,rm.timeLeft/rm.duration);
    ctx.fillStyle='rgba(255,255,255,.08)';roundRect(W/2-130,6,260,8,4);ctx.fill();
    ctx.fillStyle=beforeGreen?'#ef4444':'#22c55e';
    roundRect(W/2-130,6,260*totalPct,8,4);ctx.fill();
    ctx.textAlign='left';
  }

  // Mission result card
  if(mission&&!mission.active&&mission.gradeTimer>0){
    const a=Math.min(1,mission.gradeTimer/20);ctx.globalAlpha=a;
    if(mission.type==='red'){
      const j=mission.judgement||'FAIL';
      const colMap={PERFECT:'#f59e0b',GOOD:'#22c55e',OK:'#3b82f6',FAIL:'#ef4444'};
      const labelMap={PERFECT:'완벽한 출발!',GOOD:'좋은 출발',OK:'무사 통과',FAIL:mission.diff<0?'신호위반!':'반응 지연'};
      const subMap={PERFECT:'+8점',GOOD:'+4점',OK:'+1점',FAIL:'HP -'+RED_FAIL_HP_PENALTY};
      const col=colMap[j];
      uiCard(W/2-170,H/2-48,340,96,12,'rgba(10,5,25,.92)',col);
      ctx.textAlign='center';
      ctx.fillStyle=col;ctx.font='bold 900 22px "Noto Sans KR",sans-serif';ctx.fillText(labelMap[j],W/2,H/2-10);
      ctx.fillStyle='#fff';ctx.font='bold 900 18px "Space Grotesk",sans-serif';ctx.fillText(subMap[j],W/2,H/2+14);
      const diffMs=Math.abs(mission.diff||0);
      ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='11px "Space Grotesk",sans-serif';
      ctx.fillText((mission.diff<0?'-':'+')+diffMs.toFixed(0)+'ms',W/2,H/2+32);
    } else if(mission.type==='shelter'){
      uiCard(W/2-160,H/2-40,320,80,12,'rgba(5,25,10,.92)','rgba(34,197,94,.6)');
      ctx.textAlign='center';
      ctx.fillStyle='#4ade80';ctx.font='bold 900 15px "Noto Sans KR",sans-serif';ctx.fillText('쉼터 회복',W/2,H/2-10);
      ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='bold 700 13px "Noto Sans KR",sans-serif';ctx.fillText('+'+Math.round(mission.healAmount)+' HP  |  '+mission.mashCount+'회 연타',W/2,H/2+12);
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='10px "Noto Sans KR",sans-serif';ctx.fillText('정원오의 스마트쉼터 (A\' Design Award 수상)',W/2,H/2+30);
    }
    ctx.globalAlpha=1;ctx.textAlign='left';
  }

  // Shelter mission UI
  const inShelterMission=mission&&mission.active&&mission.type==='shelter';
  if(inShelterMission){
    const sm=mission,pct=sm.timeLeft/2200;
    ctx.fillStyle='rgba(22,101,52,.1)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,.08)';roundRect(W/2-130,6,260,10,5);ctx.fill();
    ctx.fillStyle='#22c55e';roundRect(W/2-130,6,260*pct,10,5);ctx.fill();
    ctx.textAlign='center';
    ctx.fillStyle='#4ade80';ctx.font='bold 700 12px "Noto Sans KR",sans-serif';
    if(frame%20<14)ctx.fillText('쉼터! SPACE 연타로 회복!',W/2,ROAD_TOP-12);
    const healPreview=Math.min(100-hp,sm.mashCount*3);
    ctx.fillStyle='#4ade80';ctx.font='bold 700 28px "Space Grotesk",sans-serif';ctx.fillText(sm.mashCount,W/2,H/2-2);
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.font='bold 700 9px "Space Grotesk",sans-serif';ctx.fillText('MASH COUNT',W/2,H/2+16);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='bold 700 11px "Noto Sans KR",sans-serif';ctx.fillText('+'+Math.round(healPreview)+' HP 예상',W/2,H/2+34);
    ctx.textAlign='left';
  }

  drawItemPopup();
  drawActiveEffects();
  drawStageBanner();

  // Progress bar
  const progress=Math.min(1,score/STAGES[STAGES.length-1].scoreEnd);
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,H-5,W,5);
  ctx.fillStyle=currentStage().badgeColor;ctx.fillRect(0,H-5,W*progress,5);
  STAGES.forEach((st,i)=>{if(i===0)return;const mx=W*(st.scoreEnd/STAGES[STAGES.length-1].scoreEnd);if(mx>W)return;ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(mx-1,H-7,2,7);});
}

/* =========================================================  DRAW  */
function draw(){
  ctx.clearRect(0,0,W,H);
  if(phase==='title')drawTitleScreen();
  else if(phase==='playing')drawPlaying();
  else if(phase==='gameover')drawGameOverScreen();
  else if(phase==='ending')drawEndingScreen();
}

// Init display
document.getElementById('hiDisp').textContent=String(hiScore).padStart(6,'0');

let lastTime=0;
(function loop(ts){
  const dt=lastTime?Math.min((ts-lastTime)/16.67,2):1;
  lastTime=ts;update(dt);draw();requestAnimationFrame(loop);
})(0);
</script>
</body>
</html>
