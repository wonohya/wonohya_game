<html lang="ko">
<head>

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;min-height:100vh;
    background:#fff7ed;
    font-family:'Noto Sans KR',sans-serif;color:#0f172a;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    touch-action:none;overscroll-behavior:none;-webkit-user-select:none;user-select:none;
  }
  #wrap{display:flex;flex-direction:column;align-items:center;width:100%;max-width:880px;padding:24px 16px;}
  #topbar{
    width:100%;
    background:#fff;
    border:2px solid #0f172a;
    border-bottom:none;
    border-radius:0;
    padding:10px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }
  .topbar-right{display:flex;gap:14px;align-items:center;}
  .stat{display:flex;flex-direction:column;gap:3px;}
  .stat-label{
    font-family:'Press Start 2P',monospace;
    font-size:8px;
    color:#0f172a;
    letter-spacing:.08em;
  }
  .stat-value{
    font-family:'Press Start 2P',monospace;
    font-size:13px;
    color:#0f172a;
    letter-spacing:.05em;
  }

  /* HP 하트 5칸 */
  #hpHearts{display:flex;gap:2px;align-items:center;}
  .hp-heart{
    width:9px;height:9px;
    border:1.5px solid #0f172a;
    background:#22c55e;
    position:relative;
  }
  .hp-heart.empty{background:#fff;}
  .hp-heart.low{background:#fbbf24;}
  .hp-heart.crit{background:#ef4444;}
  #hpNum{
    font-family:'Press Start 2P',monospace;
    font-size:9px;
    color:#0f172a;
    margin-left:5px;
    letter-spacing:.05em;
  }

  /* BOOST 박스 */
  #boostBox{
    display:flex;align-items:center;gap:5px;
    border:2px solid #0f172a;
    padding:3px 7px;
    background:#fff;
  }
  #boostFill{
    width:50px;height:8px;
    background:#fff;
    border:1.5px solid #0f172a;
    position:relative;overflow:hidden;
  }
  #boostFillInner{
    height:100%;width:0%;
    background:#fb923c;
    transition:width .12s;
  }
  #boostNum{
    font-family:'Press Start 2P',monospace;
    font-size:9px;
    color:#0f172a;
    letter-spacing:.05em;
  }
  #boostBox.ready #boostFillInner{
    background:repeating-linear-gradient(45deg,#fb923c,#fb923c 4px,#fbbf24 4px,#fbbf24 8px);
    animation:boostStripe .4s linear infinite;
  }
  @keyframes boostStripe{
    from{background-position:0 0;}
    to{background-position:11px 0;}
  }
  canvas{
    display:block;
    border:2px solid #0f172a;
    border-top:none;
    border-radius:0;
    width:100%;
    image-rendering:pixelated;
    touch-action:none;
    -webkit-user-select:none;user-select:none;
  }
  #canvasWrap{
  touch-action:none;
  position:relative;
  width:100%;
}
  #mobileCtrl{display:none;width:100%;margin-top:10px;}
  #mobileCtrl button{
    width:100%;padding:0;border:none;background:transparent;cursor:pointer;touch-action:manipulation;
  }
  .tap-shell{
  display:block;
  width:min(100%,440px);
  margin:0 auto;
  padding:0;
  border-radius:20px;
}

.tap-core{
  position:relative;
  display:block;
  padding:14px 18px 15px;
  overflow:hidden;
  background:
    linear-gradient(180deg,#fff 0%,#fff7ed 100%);
  color:#0f172a;
  border:2px solid #0f172a;
  border-radius:20px;
  box-shadow:
    0 8px 0 #f59e0b,
    0 14px 28px rgba(15,23,42,.18);
}

.tap-core::before{
  content:'';
  position:absolute;
  left:12px;
  top:12px;
  bottom:12px;
  width:6px;
  border-radius:999px;
  background:#fb923c;
}

.tap-main{
  display:block;
  font-size:22px;
  font-weight:1000;
  line-height:1.05;
  letter-spacing:-.04em;
}

.tap-sub{
  display:block;
  margin-top:5px;
  font-size:12px;
  font-weight:900;
  color:#64748b;
  letter-spacing:-.02em;
}

#mobileCtrl button:active .tap-core{
  transform:translateY(5px);
  box-shadow:
    0 3px 0 #f59e0b,
    0 8px 18px rgba(15,23,42,.16);
}

<script>
/* =========================================================  STORAGE  */
function safeGet(k,f=''){try{const v=localStorage.getItem(k);return v===null?f:v;}catch(e){return f;}}
function safeSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

/* =========================================================  AUDIO  */
const A=(()=>{
  let c=null;
  const g=()=>{if(!c)c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==='suspended')c.resume();return c;};
  const b=(f,d,t='square',v=0.1)=>{try{const x=g(),o=x.createOscillator(),a=x.createGain();o.type=t;o.frequency.value=f;a.gain.setValueAtTime(v,x.currentTime);a.gain.exponentialRampToValueAtTime(0.001,x.currentTime+d);o.connect(a);a.connect(x.destination);o.start();o.stop(x.currentTime+d);}catch(e){}};
  return{
    jump:()=>b(720,.07,'triangle',.08),
    jump2:()=>b(960,.06,'triangle',.07),
    pickup:(combo)=>{
      const baseFreq=440;
      const step=Math.min(combo,20);
      const freq=baseFreq*Math.pow(1.0595,step);
      b(freq,.06,'triangle',.09);
      b(freq*2,.04,'triangle',.05);
    },
    chainComplete:()=>{
      [880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>b(f,.08,'triangle',.1),i*40));
    },
    boostReady:()=>{
      [660,880,1100,1320,1760,2200].forEach((f,i)=>setTimeout(()=>b(f,.08,'square',.1),i*45));
    },
    boostStart:()=>{
      [330,440,550,660,880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>b(f,.06,'sawtooth',.12),i*30));
    },
    boostEnd:()=>{b(660,.15,'sine',.08);},
    hit:()=>b(180,.18,'sawtooth',.18),
    comboBreak:()=>{b(220,.2,'sawtooth',.12);setTimeout(()=>b(180,.15,'sawtooth',.1),100);},
    gameover:()=>{b(440,.12);setTimeout(()=>b(330,.12),130);setTimeout(()=>b(220,.3),260);},
    start:()=>{b(523,.07);setTimeout(()=>b(784,.09),80);setTimeout(()=>b(1047,.14),170);},
  };
})();

/* =========================================================  DOM CACHE  */
const DOM = {
  scoreDisp: document.getElementById('scoreDisp'),
  boostFillInner: document.getElementById('boostFillInner'),
  boostBox: document.getElementById('boostBox'),
  boostNum: document.getElementById('boostNum'),
};
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const W=canvas.width,H=canvas.height;

function setupHiDPI(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  // 게임 로직 좌표계는 항상 720x280 기준으로 고정
  canvas.width = W * dpr;
  canvas.height = H * dpr;

  // 화면에서는 반응형으로만 줄이고, 비율은 유지
  canvas.style.width = '100%';
  canvas.style.aspectRatio = `${W} / ${H}`;

  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled=false;
}
setupHiDPI();
window.addEventListener('resize', setupHiDPI);
const ROAD_TOP=85,ROAD_BOT=210,GY=ROAD_BOT-8;

/* =========================================================  HELPERS  */
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* =========================================================  GAME STATE  */
let phase='title';
let introTutorialIndex=0;
const INTRO_TUTORIAL_CARDS=[

let patternQueue=[];
let lastMajorEvents=[];
let dayNightCycleCount=0;

function recordMajorEvent(type){
  lastMajorEvents.push(type);
  if(lastMajorEvents.length>10) lastMajorEvents.shift();
}

function getMajorOrder(){
  const majors=['smart_cross','smoke','sinkhole','rain','bus_stop'];
  return [...majors].sort((a,b)=>{
    const ai=lastMajorEvents.lastIndexOf(a);
    const bi=lastMajorEvents.lastIndexOf(b);
    return ai-bi;
  });
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function hasMajorPattern(p){
  return p.some(v=>['smart_cross','smoke','sinkhole','rain','bus_stop'].includes(v));
}

function refillPatternQueue(){
  const majorOrder=getMajorOrder();
  let patterns;

  if(score < 200){
    patterns=[
      ['car'],
      ['icon'],
      ['car','icon'],
      ['icon','car'],
      ['icon','icon'],
      ['smart_cross'],
      ['rain'],
      ['smoke'],
    ];
  } else if(score < 500){
    patterns=[
      ['car','icon','car'],
      ['icon','car'],
      ['car','car','icon'],
      ['icon','icon','car'],
      ['smart_cross'],
      ['smart_cross'],
      ['smoke'],
      ['smoke','icon'],
      ['rain'],
      ['rain','icon'],
      ['booth_pickup','smoke'],
      ['sinkhole'],
    ];
  } else {
    patterns=[
      ['car','icon','car'],
      ['car','car','icon'],
      ['icon','car'],
      ['icon','icon','car'],
      ['smart_cross'],
      ['smart_cross'],
      ['smoke'],
      ['booth_pickup','smoke'],
      ['booth_pickup','smoke'],
      ['car','smoke','icon'],
      ['rain'],
      ['rain','icon'],
      ['sinkhole'],
      ['sinkhole'],
      ['bus_stop'],
    ];
  }

  const majorPatterns=patterns
    .filter(hasMajorPattern)
    .sort((a,b)=>{
      const am=a.find(v=>majorOrder.includes(v));
      const bm=b.find(v=>majorOrder.includes(v));
      return majorOrder.indexOf(am)-majorOrder.indexOf(bm);
    });
  const normalPatterns=shuffle(patterns.filter(p=>!hasMajorPattern(p)));

  const ordered=[];
  while(majorPatterns.length || normalPatterns.length){
    if(normalPatterns.length) ordered.push(normalPatterns.shift());
    if(majorPatterns.length) ordered.push(majorPatterns.shift());
  }

  const pick=ordered[Math.floor(Math.random()*ordered.length)];
  patternQueue.push(...pick);
}

function getRightmostX(){
  let mx=0;
  cars.forEach(c=>mx=Math.max(mx,c.x+52));
  shelters.forEach(s=>mx=Math.max(mx,s.x+(s.width||170)));
  smokes.forEach(z=>mx=Math.max(mx,z.x+z.width));
  boothPickups.forEach(b=>mx=Math.max(mx,b.x+34));
  sinkholes.forEach(s=>mx=Math.max(mx,s.x+280));
  busStops.forEach(b=>mx=Math.max(mx,b.x+50));
  soloIcons.forEach(ic=>mx=Math.max(mx,ic.x+30));
  if(trafficLight) mx=Math.max(mx, trafficLight.x+120);
  return mx;
}

const OBSTACLE_GAP = 500;
const MIN_CAR_GAP = 360;
const SAFE_GAP_AFTER_MISSION = 520;
function getSafeObstacleX(baseX, width=140){
  let x = Math.max(baseX, W + 70);
  const blocks=[];
  shelters.forEach(s=>{ if(!s.consumed) blocks.push({x:s.x,w:s.width||170}); });
  smokes.forEach(z=>{ if(!z.cleaned) blocks.push({x:z.x,w:z.width||260}); });
  rainZones.forEach(z=>{ if(!z.cleaned) blocks.push({x:z.x,w:z.width||280}); });
  sinkholes.forEach(s=>{ if(!s.consumed) blocks.push({x:s.x,w:280}); });
  soloIcons.forEach(ic=>{ if(!ic.collected) blocks.push({x:ic.x-18,w:36}); });
  boothPickups.forEach(b=>{ if(!b.collected) blocks.push({x:b.x-18,w:36}); });
  busStops.forEach(b=>{ if(!b.collected) blocks.push({x:b.x-26,w:52}); });
  cars.forEach(c=>blocks.push({x:c.x,w:52}));
  if(trafficLight && !trafficLight.consumed) blocks.push({x:trafficLight.x-56,w:112});
  for(let pass=0; pass<5; pass++){
    for(const b of blocks){
      const overlap = x < b.x + b.w + OBSTACLE_GAP && x + width + OBSTACLE_GAP > b.x;
      if(overlap) x = b.x + b.w + OBSTACLE_GAP;
    }
  }
  return x;
}

function getSafeCarX(baseX){
  let x = Math.max(baseX, W + 80);
  const blocks=[];
  cars.forEach(c=>blocks.push({x:c.x,w:52,gap:MIN_CAR_GAP}));
  shelters.forEach(s=>{ if(!s.consumed) blocks.push({x:s.x,w:s.width||170,gap:SAFE_GAP_AFTER_MISSION}); });
  smokes.forEach(z=>{ if(!z.cleaned) blocks.push({x:z.x,w:z.width||280,gap:SAFE_GAP_AFTER_MISSION}); });
  rainZones.forEach(z=>{ if(!z.cleaned) blocks.push({x:z.x,w:z.width||280,gap:SAFE_GAP_AFTER_MISSION}); });
  sinkholes.forEach(s=>{ if(!s.consumed) blocks.push({x:s.x,w:280,gap:SAFE_GAP_AFTER_MISSION}); });
  if(trafficLight && !trafficLight.consumed) blocks.push({x:trafficLight.x-56,w:112,gap:SAFE_GAP_AFTER_MISSION});
  for(let pass=0; pass<5; pass++){
    for(const b of blocks){
      const gap=b.gap||MIN_CAR_GAP;
      const overlap = x < b.x + b.w + gap && x + 52 + gap > b.x;
      if(overlap) x = b.x + b.w + gap;
    }
  }
  return x;
}

    if(busStops.some(b=>!b.collected)) return;
    if(boostActive || busMode) return;

    busStops.push({x:sx, y:GY-60, collected:false});
    recordMajorEvent('bus_stop');
  }
}

    addPickupParticles(P.x,P.y-20,'#94a3b8');
    addPickupParticles(P.x,P.y-20,'#fbbf24');

    setScore(score+8); addBoost(4);
    flash(34,197,94,0.4); A.pickup(combo);
    showPolicyBanner('게임 효과','위험구간 복구','도로 위험 복구 성공','#86efac');
    addFloatText(P.x,P.y-60,'위험 구간 부분 복구 +8','#22c55e');
    addPickupParticles(P.x,P.y-20,'#94a3b8');
    invul=Math.max(invul,40);
  } else {
    hp=Math.max(0,hp-18); breakCombo();
    flash(239,68,68,0.55); shake(8); A.hit();
    addFloatText(P.x,P.y-60,'도로 위험 발생! -18','#ef4444');
    updateHP(); invul=Math.max(invul,60);
  }
  if(sm.sinkRef) sm.sinkRef.consumed=true;
  sm.active=false;
  sinkTapCount=0;
  if(hp<=0){hp=0;updateHP();doGameOver();}
}

function confirmSinkhole(){
  if(!sinkholeMission||!sinkholeMission.active||sinkholeMission.judged) return;
  const now=performance.now();
  if(now-sinkLastTapAt<40) return;
  sinkLastTapAt=now;

  sinkTapCount=Math.min(sinkTapRequired,sinkTapCount+1);
  A.pickup(sinkTapCount);
  addPickupParticles(P.x, P.y-10, '#94a3b8');
  addFloatText(P.x+44,P.y-58,`지반 탐사 ${sinkTapCount}/${sinkTapRequired}`,'#fbbf24');

  if(sinkTapCount >= sinkTapRequired){
    sinkholeMission.judged=true;
    _judgeSinkhole(sinkholeMission);
  }
}

/* =========================================================  BOOST  */
function addBoost(amount){
  if(boostActive)return;
  boostGauge=Math.min(100,boostGauge+amount);
  if(DOM.boostFillInner) DOM.boostFillInner.style.width=boostGauge+'%';
  if(DOM.boostNum) DOM.boostNum.textContent=Math.round(boostGauge);
  if(boostGauge>=100){
    if(DOM.boostBox) DOM.boostBox.classList.add('ready');
    if(!boostActive) activateBoost();
  }
}
function activateBoost(){
  boostActive=true;
  boostEndTime=performance.now()+T.BOOST_DURATION;
  invul=Math.max(invul, Math.ceil(T.BOOST_DURATION/16.67));
  A.boostStart();
  activateBus();
}
function endBoost(){
  boostActive=false;
  boostGauge=0;
  lastBusEndAt = performance.now();

  if(DOM.boostFillInner) DOM.boostFillInner.style.width='0%';
  if(DOM.boostNum) DOM.boostNum.textContent='0';
  if(DOM.boostBox) DOM.boostBox.classList.remove('ready');
  A.boostEnd();
  deactivateBus();
}

  return !!(boostActive || busMode || invul > 0);

      z.cleaned = true;z.hasBooth = true;z.alpha = 0.05;z.bonusGiven = true;

function setScore(n){
  score=n;
  DOM.scoreDisp.textContent=String(n).padStart(6,'0');
  if(n>hiScore){ hiScore=n; safeSet('chakchak_core_hi',String(n)); }
}

function updateHP(){
  const hearts=document.querySelectorAll('.hp-heart');
  const hpNum=document.getElementById('hpNum');
  if(!hearts.length)return;
  const filled=Math.ceil(hp/20);
  hearts.forEach((h,i)=>{
    h.classList.remove('empty','low','crit');
    if(i>=filled){h.classList.add('empty');return;}
    if(hp<30) h.classList.add('crit');
    else if(hp<60) h.classList.add('low');
  });
  if(hpNum) hpNum.textContent=Math.round(hp);
}

  let base=T.BASE_SPEED+Math.min(T.MAX_SPEED-T.BASE_SPEED,score*T.SPEED_GROWTH);

}

  const nt=nightTransition||0;

    grad.addColorStop(0.5,'#ffd9b8');

    grad.addColorStop(0,`rgb(${Math.round(255*(1-nt)+5*nt)},${Math.round(244*(1-nt)+3*nt)},${Math.round(224*(1-nt)+20*nt)})`);

/* =========================================================  SINKHOLE DRAW  */
function drawSinkhole(s){
  if(s.consumed) return;
  const isMission=sinkholeMission&&sinkholeMission.active&&sinkholeMission.sinkRef===s;
  const pulse=0.55+0.45*Math.abs(Math.sin(frame*.2));
  const roadH=ROAD_BOT-ROAD_TOP;
  const cx=s.x+140;
  ctx.save();

  ctx.fillStyle=`rgba(239,68,68,${0.15*pulse})`;
  ctx.fillRect(s.x,ROAD_TOP,280,roadH);

  const crackProgress = isMission ? Math.max(0,1-sinkTapCount/sinkTapRequired) : 1;

  ctx.fillStyle=`rgba(6,6,18,${0.92*crackProgress})`;
  ctx.beginPath();ctx.ellipse(cx,ROAD_BOT-16,52*crackProgress+4,16*crackProgress+3,0,0,Math.PI*2);ctx.fill();

  if(crackProgress > 0.1){
    ctx.strokeStyle=`rgba(239,68,68,${0.8*crackProgress*pulse})`;
    ctx.lineWidth=2.5;
    const cracks=[[cx,ROAD_BOT-16,cx-38,ROAD_BOT-44],[cx,ROAD_BOT-16,cx+42,ROAD_BOT-50],[cx,ROAD_BOT-16,cx-20,ROAD_BOT-62],[cx,ROAD_BOT-16,cx+18,ROAD_BOT-58],[cx,ROAD_BOT-16,cx-44,ROAD_BOT-28],[cx,ROAD_BOT-16,cx+46,ROAD_BOT-30]];
    cracks.forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  }

  if(isMission && sinkTapCount > 0){
    const filled=sinkTapCount/sinkTapRequired;
    ctx.fillStyle=`rgba(148,163,184,${0.75*filled})`;
    ctx.beginPath();ctx.ellipse(cx,ROAD_BOT-16,(52+4)*(filled),(16+3)*(filled),0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(203,213,225,${0.4*filled})`;ctx.lineWidth=1;
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(cx-50*filled+i*28*filled,ROAD_BOT-22);ctx.lineTo(cx-40*filled+i*28*filled,ROAD_BOT-10);ctx.stroke();}
  }

  ctx.globalAlpha = isMission ? 1 : Math.max(0.7,pulse);
  if(isMission){
    ctx.fillStyle='rgba(15,23,42,0.96)';ctx.fillRect(s.x,ROAD_TOP,280,52);
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=2.5;ctx.strokeRect(s.x+1,ROAD_TOP+1,278,50);
    ctx.fillStyle='#fbbf24';ctx.font='bold 900 13px "Space Grotesk",sans-serif';ctx.textAlign='center';
    ctx.fillText('GPR 조사! 빠르게 5번 탭!',cx,ROAD_TOP+16);
    const dotGap=34;
    const dotStartX=cx-((sinkTapRequired-1)*dotGap)/2;
    for(let i=0;i<sinkTapRequired;i++){
      const dx=dotStartX+i*dotGap;
      ctx.fillStyle=i<sinkTapCount?'#fbbf24':'rgba(255,255,255,0.22)';
      ctx.beginPath();ctx.arc(dx,ROAD_TOP+34,8,0,Math.PI*2);ctx.fill();
      if(i<sinkTapCount){ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(dx,ROAD_TOP+34,9.5,0,Math.PI*2);ctx.stroke();}
    }
    const gx=s.x+12,gy=ROAD_TOP+47,gw=256,gh=5;
    ctx.fillStyle='rgba(255,255,255,0.15)';roundRect(gx,gy,gw,gh,3);ctx.fill();
    const ratio=Math.min(1,sinkTapCount/sinkTapRequired);
    const gCol=ratio>=1?'#fbbf24':ratio>=0.5?'#22c55e':'#94a3b8';
    ctx.fillStyle=gCol;roundRect(gx,gy,gw*ratio,gh,3);ctx.fill();
    const remain=Math.max(0,(sinkholeMission.deadline-performance.now())/4000);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(s.x,ROAD_BOT,280,5);
    ctx.fillStyle=remain>0.5?'#22c55e':remain>0.25?'#fbbf24':'#ef4444';
    ctx.fillRect(s.x,ROAD_BOT,280*remain,5);
  } else {
    ctx.fillStyle='rgba(185,28,28,0.92)';ctx.fillRect(s.x,ROAD_TOP,280,36);
    ctx.fillStyle='#fff';ctx.font='bold 700 13px "Noto Sans KR",sans-serif';ctx.textAlign='center';
    ctx.fillText('도로 위험! GPR 탐지 준비',cx,ROAD_TOP+23);
  }

  ctx.textAlign='left';
  ctx.restore();
}

  else{ctx.beginPath();ctx.arc(x,yy,17,0,Math.PI*2);ctx.fill();}

  ctx.strokeStyle='rgba(255,255,255,.95)';ctx.lineWidth=2.5;

  ctx.fillStyle='#fff';ctx.font='bold 900 12px "Noto Sans KR",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';

  ctx.fillText(ic.data.name,x,yy+32);
  ctx.textAlign='left';
  ctx.restore();
}

function getPendingItems(){
  const map = new Map();
  function addItem(key, item){
    if(map.has(key)) map.get(key).count += item.count || 1;
    else map.set(key, {...item, count: item.count || 1});
  }
  const pendingShelters = shelters.filter(s=>!s.consumed).length;
  const pendingCross    = trafficLight && !trafficLight.consumed ? 1 : 0;
  if(pendingShelters>0){
    addItem('shelter',{name:'쉼터',code:'쉼터',count:pendingShelters,color:'#06b6d4'});
  }
  if(pendingCross>0){
    addItem('cross',{name:'횡단보도',code:'횡단보도',count:pendingCross,color:'#fbbf24'});
  }
  if(smokeBoothShield>0){
    addItem('booth',{name:'흡연부스',code:'흡연부스',count:smokeBoothShield,color:'#0d9488'});
  }
  return Array.from(map.values());
}

// 새로 획득한 아이템 추적용 (전역에 추가)
let lastItemCounts = {};
let itemFlash = {};  // {name: untilTime}

function updateItemFlash(items){
  items.forEach(item=>{
    const prev = lastItemCounts[item.name] || 0;
    if(item.count > prev){
      itemFlash[item.name] = performance.now() + 1500;  // 1.5초 강조
    }
    lastItemCounts[item.name] = item.count;
  });
  // 사라진 아이템 정리
  Object.keys(lastItemCounts).forEach(k=>{
    if(!items.some(i=>i.name===k)) lastItemCounts[k]=0;
  });
}

function drawItemIcon(x, y, type, color){
  ctx.save();

  if(type==='shelter'){
    // 쉼터 — 지붕 있는 작은 집

    roundRect(-8,-5,16,12,3);ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-10,-5);ctx.lineTo(0,-11);ctx.lineTo(10,-5);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.fillRect(-4,-1,3,4);
    ctx.fillRect(1,-1,3,4);
  } else if(type==='cross'){
    // 횡단 — 신호등
    ctx.fillStyle='#0f172a';
    roundRect(-5,-9,10,18,2);ctx.fill();
    ctx.fillStyle='#ef4444';
    ctx.beginPath();ctx.arc(0,-4,2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#22c55e';

    ctx.fillRect(-4,-3,8,7);
  }

  ctx.restore();
}

function drawPendingItemsPanel(){
  const items=getPendingItems();
  updateItemFlash(items);
  if(!items.length) return;

  const slotW=112;
  const slotH=26;
  const gap=4;
  const maxSlots=3;
  const shown=items.slice(0,maxSlots);

  const baseX=10;
  const baseY=10;

  ctx.save();

  // 헤더 (픽셀 박스)
  ctx.fillStyle='#0f172a';
  ctx.fillRect(baseX,baseY,slotW,16);
  ctx.fillStyle='#fbbf24';
  ctx.font='bold 700 9px "Press Start 2P",monospace';
  ctx.textAlign='center';
  ctx.textBaseline='alphabetic';
  ctx.fillText('보유 아이템',baseX+slotW/2,baseY+11);

  shown.forEach((item,i)=>{
    const flashUntil=itemFlash[item.name]||0;
    const isFlashing=performance.now()<flashUntil;
    const x=baseX;
    const y=baseY+20+i*(slotH+gap)+(isFlashing ? Math.sin(frame*.8)*1.5 : 0);

    ctx.fillStyle='#fff';
    ctx.fillRect(x,y,slotW,slotH);
    ctx.strokeStyle=isFlashing ? '#fbbf24' : '#0f172a';
    ctx.lineWidth=2;
    ctx.strokeRect(x,y,slotW,slotH);

    const chipX=x+5, chipY=y+(slotH-14)/2;
    ctx.fillStyle=item.color;
    ctx.fillRect(chipX,chipY,14,14);
    ctx.strokeStyle='#0f172a';
    ctx.lineWidth=1.5;
    ctx.strokeRect(chipX,chipY,14,14);

    ctx.fillStyle='#0f172a';
    ctx.font='bold 900 10px "Noto Sans KR",sans-serif';
    ctx.textAlign='left';
    ctx.fillText(item.label || item.name, x+24, y+15);

    ctx.textAlign='right';
    ctx.fillStyle=item.color==='#fbbf24' ? '#92400e' : item.color;
    ctx.fillText('×'+item.count, x+slotW-6, y+15);
  });

  if(items.length>maxSlots){
    const moreY=baseY+20+maxSlots*(slotH+gap);
    ctx.fillStyle='#0f172a';
    ctx.fillRect(baseX,moreY,slotW,16);
    ctx.fillStyle='#fff';
    ctx.font='bold 700 8px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.fillText('외 '+(items.length-maxSlots)+'개',baseX+slotW/2,moreY+11);
  }

  ctx.restore();
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
}

  ctx.fillStyle='#0f172a';ctx.beginPath();ctx.arc(bsx+6,bsy+bsh,3.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bsx+bsw-6,bsy+bsh,3.5,0,Math.PI*2);ctx.fill();

/* =========================================================  SHELTER TIMING GAUGE  */
function shelterTempValue(t){return Math.sin(t*Math.PI*2.2-Math.PI/2);}
function signalTimingGrade(diff){
  if(diff<=RED_PERFECT_MS)return 'PERFECT';
  if(diff<=RED_GOOD_MS)return 'GOOD';
  if(diff<=RED_OK_MS)return 'OK';
  return 'FAIL';
}
function drawShelterTimingGauge(){
  if(!mission || !mission.active || mission.type!=='shelter') return;

  const sm=mission;
  const elapsed=performance.now()-sm.startTime;
  const t=Math.min(1,elapsed/sm.duration);
  const v=shelterTempValue(t);

  // 화면 중앙 고정: 쉼터 위치가 좌측에 있어도 조작 UI는 중앙에 둔다
  const anchorX = W/2;
  const anchorY = H/2;

  // 1. 부드러운 비네트
  const vg=ctx.createRadialGradient(anchorX,H/2,60,anchorX,H/2,W*0.7);
  vg.addColorStop(0,'rgba(6,182,212,0)');
  vg.addColorStop(1,`rgba(6,182,212,${0.10+0.03*Math.sin(frame*.18)})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // 2. 게이지 패널: 화면 중앙 크게
  const gw=380, gh=82;
  const gx=Math.max(20, Math.min(W-gw-20, anchorX-gw/2));
  const gy=Math.max(44, Math.min(H-gh-28, anchorY-gh/2));

  // 패널 배경
  ctx.fillStyle='rgba(15,23,42,.94)';
  roundRect(gx,gy,gw,gh,12);ctx.fill();
  ctx.strokeStyle='rgba(103,232,249,.7)';ctx.lineWidth=1.5;
  roundRect(gx,gy,gw,gh,12);ctx.stroke();

  // 헤더 텍스트
  ctx.textAlign='center';
  ctx.fillStyle='#67e8f9';
  ctx.font='bold 1000 18px "Noto Sans KR",sans-serif';
  ctx.fillText('냉·온열의자 타이밍',gx+gw/2,gy+22);

  // 게이지 바
  const barX=gx+24, barY=gy+34, barW=gw-48, barH=18;
  ctx.fillStyle='rgba(15,23,42,.6)';roundRect(barX,barY,barW,barH,7);ctx.fill();
  // 추움(왼) / 더움(오) 영역
  ctx.fillStyle='rgba(59,130,246,.55)';roundRect(barX,barY,barW*0.32,barH,7);ctx.fill();
  ctx.fillStyle='rgba(239,68,68,.55)';roundRect(barX+barW*0.68,barY,barW*0.32,barH,7);ctx.fill();
  // GOOD/PERFECT 중앙
  const halfW=barW/2;
  const goodPx=halfW*GAME_TUNING.SHELTER_TEMP_GOOD;
  const perfPx=halfW*GAME_TUNING.SHELTER_TEMP_PERFECT;
  const cX=barX+barW/2;
  ctx.fillStyle='rgba(34,197,94,.85)';roundRect(cX-goodPx,barY-2,goodPx*2,barH+4,8);ctx.fill();
  ctx.fillStyle='rgba(103,232,249,.95)';roundRect(cX-perfPx,barY-3,perfPx*2,barH+6,8);ctx.fill();

  // 마커
  const markerX=cX+v*halfW;
  ctx.fillStyle='#facc15';
  ctx.beginPath();ctx.arc(markerX,barY+barH/2,8,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(markerX,barY+barH/2,8,0,Math.PI*2);ctx.stroke();

  // 라벨
  ctx.fillStyle='rgba(255,255,255,.65)';
  ctx.font='bold 900 12px "Noto Sans KR",sans-serif';
  ctx.fillText('추움',barX+15,gy+gh-4);
  ctx.fillText('쾌적',cX,gy+gh-4);
  ctx.fillText('더움',barX+barW-15,gy+gh-4);

  // 남은 시간 (작게, 마커 옆)
  const remain=Math.max(0,(sm.duration-elapsed)/1000);
  ctx.fillStyle='#fbbf24';
  ctx.font='bold 900 14px "Space Grotesk",sans-serif';
  ctx.textAlign='right';
  ctx.fillText(remain.toFixed(1)+'s',gx+gw-16,gy+22);
  ctx.textAlign='left';
}

/* =========================================================  INPUT  */
function handleSpace(e){
  if(tutorialActive){ dismissTutorial(); return; }
  if(sinkholeMission && sinkholeMission.active && !sinkholeMission.judged){
    confirmSinkhole();
    return;
  }
  if(e&&e.preventDefault)e.preventDefault();
  if(textEventActive)return;
  if(phase==='title'){startGame();return;}
  if(phase==='gameover'){
    startGame();
    return;
  }
  if(phase!=='playing')return;

  if(mission&&mission.active&&mission.type==='shelter'){
    const now=performance.now();
    if(mission.tapped)return;
    mission.tapped=true;mission.tapTime=now;
    const elapsed=now-mission.startTime;
    const t=Math.min(1,elapsed/mission.duration);
    const v=shelterTempValue(t);
    const abs=Math.abs(v);
    mission.tempValue=v;
    if(abs<=GAME_TUNING.SHELTER_TEMP_PERFECT) mission.judgement='PERFECT';
    else if(abs<=GAME_TUNING.SHELTER_TEMP_GOOD) mission.judgement='GOOD';
    else mission.judgement='MISS';
    if(mission.judgement==='MISS')A.hit(); else A.pickup(combo||1);
    endMission();
    return;
  }



  if(P.jumpCount<2){
    const isSlipping = performance.now() < rainSlipUntil;
    const baseJump = boostActive ? T.SUPER_JUMP_VY : T.JUMP_VY;
    const jvy = isSlipping ? baseJump * RAIN_SLIP_JUMP_MULT : baseJump;
    P.vy = jvy;
    P.jumpCount++;
    if(isSlipping){
      rainSlipUntil=0;rainSlipNotified=false;
      rainSkidUntil=performance.now()+650;rainSkidPower=12;
      shake(5);flash(96,165,250,0.28);
      addFloatText(P.x+56,P.y-58,'빗길 미끄러짐! 과점프','#60a5fa');
    }
    if(P.jumpCount===1)A.jump();else A.jump2();
  }
}

function processPlayerInput(e){
  if(e && e.preventDefault) e.preventDefault();
  if(e && e.stopPropagation) e.stopPropagation();
  if(sinkholeMission && sinkholeMission.active && !sinkholeMission.judged){
    confirmSinkhole();
    return;
  }
  handleSpace(e);
}

window.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.altKey||e.metaKey)return;
  if(e.key==='Tab'||e.key==='Escape'||(e.key.startsWith('F')&&e.key.length>1))return;
  e.preventDefault();
  if(sinkholeMission && sinkholeMission.active && !sinkholeMission.judged){
    confirmSinkhole();
    return;
  }
  if(e.repeat)return;
  handleSpace(e);
});

let lastDirectInputAt=0;
let lastClickFallbackAt=0;

// v10: handlePointerPlay — 싱크홀 연타 중 120ms 쿨다운 우회
function handlePointerPlay(e){
  const now=performance.now();
  if(sinkholeMission && sinkholeMission.active && !sinkholeMission.judged){
    if(e && e.preventDefault) e.preventDefault();
    // pointerdown+touchstart 동시 발화만 막고, 사용자 연타는 허용
    if(now-lastDirectInputAt<40) return;
    lastDirectInputAt=now;
    confirmSinkhole();
    return;
  }
  if(now-lastDirectInputAt<120){
    if(e && e.preventDefault) e.preventDefault();
    if(e && e.stopPropagation) e.stopPropagation();
    return;
  }
  lastDirectInputAt=now;
  processPlayerInput(e);
}
canvas.addEventListener('pointerdown',handlePointerPlay,{passive:false});
canvas.addEventListener('touchstart',handlePointerPlay,{passive:false});
canvas.addEventListener('click',e=>{
  // 싱크홀 미션 중엔 click 이벤트 무시 (pointerdown/touchstart가 처리)
  if(sinkholeMission && sinkholeMission.active && !sinkholeMission.judged) return;
  const now=performance.now();
  if(now-lastDirectInputAt<500 || now-lastClickFallbackAt<120)return;
  lastClickFallbackAt=now;
  processPlayerInput(e);
});

const tapBtn=document.getElementById('tapBtn');
if(tapBtn){
  const handleTapButton=e=>{
    if(e && e.preventDefault) e.preventDefault();
    if(e && e.stopPropagation) e.stopPropagation();
    handlePointerPlay(e);
  };
  tapBtn.addEventListener('pointerdown',handleTapButton,{passive:false});
  tapBtn.addEventListener('touchstart',handleTapButton,{passive:false});
  tapBtn.addEventListener('click',e=>{
    if(e && e.preventDefault) e.preventDefault();
    if(e && e.stopPropagation) e.stopPropagation();
    const now=performance.now();
    if(now-lastDirectInputAt<500 || now-lastClickFallbackAt<120)return;
    lastClickFallbackAt=now;
    processPlayerInput(e);
  });
}

  } else {

});

/* =========================================================  UPDATE  */
function update(dt=1){
  frame++; // 타이틀 화면에서도 애니메이션이 돌도록 위로 이동

  if(phase!=='playing') return;
  const now=performance.now();
  if(sinkholeSpawnCooldown>0)sinkholeSpawnCooldown-=dt;
  const inMission=mission&&mission.active;
  if(inMission){
    const elapsed=now-mission.startTime;
    mission.timeLeft=mission.duration-elapsed;
    if(mission.earlyTapFlash>0)mission.earlyTapFlash-=dt;
    if(mission.type==='red' && mission.lightRef) updateTrafficLight(dt);
    if(mission.timeLeft<=0){mission.timeLeft=0;endMission();}
  }
  if(mission&&!mission.active&&mission.gradeTimer>0){mission.gradeTimer-=dt;if(mission.gradeTimer<=0)mission=null;}
  const freezeMission=(tutorialActive || (mission&&mission.active&&(mission.type==='red'||mission.type==='shelter'))
    || (sinkholeMission&&sinkholeMission.active)
    || textEventActive
    || now<actionCueFreezeUntil);
  if(!freezeMission){maybeSpawnTraffic();updateTrafficLight(dt);maybeStartTextEvent();}
  if(tutorialActive && performance.now()>=tutorialResumeAt) dismissTutorial();
  if(cameraShake>0) cameraShake=Math.max(cameraShake-0.6*dt,0);
  if(flashColor){flashColor.life-=dt;if(flashColor.life<=0)flashColor=null;}

  const moveSpd=(freezeMission?0:spd()*dt);
  scroll+=moveSpd;

  if(boostActive&&now>=boostEndTime) endBoost();
  if(boostActive || busMode) clearPathForBus();

  P.vy+=T.GRAVITY*dt;
  P.y+=P.vy*dt;
  if(P.y>=GY){P.y=GY;P.vy=0;P.jumpCount=0;}

  if(!freezeMission){
    spawnTimer-=dt;
    // 시작 전 전체 튜토리얼로 대체: 장애물 등장마다 멈추는 튜토리얼은 비활성화
    if(spawnTimer<=0){
      const rightmost=getRightmostX();
      if(rightmost<W+220) spawnNext();
      spawnTimer=Math.max(20,40-Math.random()*15);
    }
  }

  shelters.forEach(s=>s.x-=moveSpd);
  smokes.forEach(z=>z.x-=moveSpd);
  boothPickups.forEach(b=>{ if(!b.collected) b.x-=moveSpd; });
  rainZones.forEach(z=>z.x-=moveSpd);
  sinkholes.forEach(s=>{ if(!s.consumed) s.x-=moveSpd; });
  shelters=shelters.filter(s=>s.x>-220);
  smokes=smokes.filter(z=>z.x+z.width>-120);
  boothPickups=boothPickups.filter(b=>b.x>-60 && !b.collected);
  rainZones=rainZones.filter(z=>z.x+z.width>-120);
  sinkholes=sinkholes.filter(s=>s.x>-200);
  // v10: nightZones 루프 제거됨

  soloIcons.forEach(ic=>{ if(!ic.collected) ic.x-=moveSpd; });
  soloIcons=soloIcons.filter(ic=>ic.x>-60&&!ic.collected);

  busStops.forEach(b=>{ if(!b.collected) b.x-=moveSpd; });
  busStops=busStops.filter(b=>b.x>-60 && !b.collected);

  const pb=playerBox();

  for(const b of busStops){
    if(b.collected) continue;
    if(aabbHit(pb,{x1:b.x-24,y1:b.y-28,x2:b.x+24,y2:b.y+28})){
      b.collected=true;boostGauge=100;activateBoost();
      showActionCue('성공버스', '착착 주행', '#0ea5e9', 90);
      addPickupParticles(b.x,b.y,'#7dd3fc');flash(14,165,233,0.45);shake(4);
    }
  }

  for(const ic of soloIcons){
    if(ic.collected) continue;
    if(aabbHit(pb,{x1:ic.x-16,y1:ic.y-16,x2:ic.x+16,y2:ic.y+16})){
      ic.collected=true;
      const gain=6;addBoost(gain);
      combo++;updateComboUI();
      const tier=getComboTier();
      const pts=Math.round(3*tier.mult);
      setScore(score+pts);
      addFloatText(ic.x,ic.y-28,'+'+pts+' 부스트↑',ic.data.col);
      addPickupParticles(ic.x,ic.y,ic.data.col);
      A.pickup(combo);
      applyInstantEffect(ic);
      if(ic.data.type==='daedeun' && dayNightPhase==='night'){
        ddnAppActive=true;
        addFloatText(ic.x,ic.y-48,'든든앱 ON!','#7c3aed');
        flash(196,181,253,0.4);
      }
    }
  }

  for(const z of rainZones){
    const inZone = P.x>z.x && P.x<z.x+z.width;
    if(!inZone || z.cleaned) continue;
    if(boostActive||busMode){z.cleaned=true;z.hasPump=true;z.alpha=0.05;z.bonusGiven=true;rainClearTimer=100;addFloatText(P.x,P.y-56,'빗물정원 착착','#3b82f6');continue;}
    const infraActive = z.hasPump || performance.now() < rainInfraUntil;
    if(infraActive){
      heatRoadUntil=Math.max(heatRoadUntil,performance.now()+220);
      rainSlipUntil=0;rainSlipNotified=false;rainSkidUntil=0;rainSkidPower=0;
      if(!z.bonusGiven){z.bonusGiven=true;setScore(score+10);addBoost(4);rainClearTimer=90;showActionCue('빗길 안정화', '미끄럼 감소', '#3b82f6', 90);flash(251,191,36,0.24);shake(2);A.pickup(combo);}
    }else{
      rainSlipUntil=Math.max(rainSlipUntil,performance.now()+950);
      rainSkidUntil=Math.max(rainSkidUntil,performance.now()+450);
      rainSkidPower=Math.max(rainSkidPower,8);
      if(!rainSlipNotified){rainSlipNotified=true;showActionCue('빗길 주의','점프 거리 증가','#60a5fa',0);}
    }
  }

  // 낮/밤 사이클
  if(phase==='playing' && !freezeMission){
    dayNightTimer+=dt;
    if(dayNightPhase==='day'){
      nightTransition=Math.max(0,nightTransition-0.08*dt);
      if(dayNightTimer>=DAY_FRAMES){
        dayNightPhase='night';dayNightTimer=0;nightTransition=1;ddnAppActive=false;
        showPolicyBanner('야간 구간','야간 구간 돌입','안심귀가 아이콘을 찾아라','#ddd6fe');
        showActionCue('야간 구간', '안심귀가 찾기', '#ddd6fe', 0);
        flash(30,64,175,0.28);
        // v10: 야간 진입 시 든든앱 아이콘 1개 강제 스폰
        {
          const ddnType=SOLO_ICON_TYPES.find(t=>t.type==='daedeun');
          if(ddnType){
            const dx=getSafeObstacleX(Math.max(W+80,getRightmostX()+120),36);
            soloIcons.push({x:dx,y:GY-55,data:ddnType,collected:false});
          }
        }
      }
    }else{
      nightTransition=1;
      if(dayNightTimer>=NIGHT_FRAMES){
        dayNightPhase='day';dayNightTimer=0;nightTransition=0;
        dayNightCycleCount++;
        if(ddnAppActive){setScore(score+15);addBoost(10);addFloatText(P.x,P.y-62,'밤길 착착! +15','#bfdbfe');flash(96,165,250,0.22);}
        ddnAppActive=false;
        if(dayNightCycleCount >= 1 && lastTextCycleTriggered < dayNightCycleCount && !textEventActive && !(mission&&mission.active) && !(sinkholeMission&&sinkholeMission.active)){
          lastTextCycleTriggered = dayNightCycleCount;
          startTextEvent();
        }
      }
    }
  }

  // GPR 싱크홀
  for(const s of sinkholes){
    if(s.consumed) continue;
    if(!s.warned && s.x < W+60){
      s.warned=true;
      flash(239,68,68,0.28);
    }
    if(!s.triggered && !(mission&&mission.active) && P.x > s.x-220 && P.x < s.x+280){
      s.triggered=true;sinkTapCount=0;sinkTapRequired=5;sinkLastTapAt=0;
      sinkholeMission={active:true,sinkRef:s,deadline:performance.now()+2000,judged:false};
      showActionCue('싱크홀 조사', '2초 안에 5번 탭', '#ef4444', 90);
      flash(239,68,68,0.38);shake(4);
    }
  }
  if(sinkholeMission && sinkholeMission.active){
    const sm=sinkholeMission;
    if(!sm.judged && performance.now()>=sm.deadline){sm.judged=true;_judgeSinkhole(sm);}
  }
  if(sinkholeMission && !sinkholeMission.active){sinkholeMission=null;}

  for(const b of boothPickups){
    if(b.collected) continue;
    if(aabbHit(pb,{x1:b.x-18,y1:b.y-22,x2:b.x+18,y2:b.y+22})){
      b.collected=true;smokeBoothShield++;setScore(score+10);addBoost(5);
      showActionCue('흡연부스', '연기 구간 방어', '#0d9488', 90);
      addPickupParticles(b.x,b.y,'#99f6e4');flash(153,246,228,0.25);A.pickup(combo);
    }
  }

  for(const z of smokes){
    const inZone = P.x > z.x && P.x < z.x + z.width;
    if(!inZone || z.cleaned) continue;
    if(boostActive || busMode){
      z.cleaned=true;z.hasBooth=true;z.alpha=0.05;z.bonusGiven=true;
      smokeClearTimer=100;addFloatText(P.x,P.y-56,'연기구간 착착 통과','#0d9488');continue;
    }
    if(z.hasBooth){
      if(!z.bonusGiven){z.bonusGiven=true;setScore(score+10);addBoost(4);smokeClearTimer=90;showActionCue('연기 구간', '부스 설치 완료', '#0d9488', 90);flash(153,246,228,0.28);shake(3);A.pickup(combo);}
    }else if(smokeBoothShield>0){
      z.cleaned=true;z.hasBooth=true;z.fromItem=true;z.bonusGiven=true;smokeBoothShield--;
      smokeClearTimer=110;hp=Math.min(100,hp+8);updateHP();setScore(score+14);addBoost(4);
      addFloatText(P.x,P.y-56,'흡연부스 설치!','#0d9488');
      addPickupParticles(P.x,P.y-24,'#99f6e4');flash(153,246,228,0.35);shake(4);A.pickup(combo);
    }else{
      hp-=0.12*dt;  // v10: 드레인 완화 (0.24→0.12)
      if(frame%60===0){
        showActionCue('연기 구간','HP 감소 중','#f97316',0);
      }
      if(hp<=0){hp=0;updateHP();doGameOver();return;}
      updateHP();
    }
  }

  // 스마트쉼터 진입 판정
  if(!freezeMission){
    for(const sh of shelters){
      if(boostActive || busMode){
        const nearShelter = P.x >= sh.x - 20 && P.x <= sh.x + (sh.width||170) + 20;
        if(nearShelter && !sh.consumed){sh.consumed=true;sh.timingStarted=true;addFloatText(P.x,P.y-58,'쉼터 착착 통과','#06b6d4');}
        continue;
      }
      const inShelter = P.x >= sh.x + 10 && P.x <= sh.x + (sh.width||170) - 10;
      if(inShelter && !sh.consumed && !sh.timingStarted){
        sh.timingStarted=true;invul=Math.max(invul,36);hp=Math.min(100,hp+0.18*dt);updateHP();
        mission={active:true,type:'shelter',startTime:performance.now(),duration:GAME_TUNING.SHELTER_TEMP_DURATION,tapped:false,judgement:null,tempValue:0,gradeTimer:0,shelterRef:sh};
        showActionCue('스마트쉼터', '쾌적 타이밍에 맞춰 탭', '#06b6d4', 90);
        break;
      }
    }
  }

  if(busMode){
    const tnow=performance.now();
    if(tnow-lastAutoCitizenAt>3600){addCitizen();lastAutoCitizenAt=tnow;}
  }

  cars.forEach(c=>{
    if(freezeMission) return;
    c.x-=carSpd()*dt;
    if(c.pushed){c.x+=6*dt;c.pushVy+=0.5*dt;c.pushY+=c.pushVy*dt;}
  });
  cars=cars.filter(c=>c.x>-70&&c.pushY<200);

  const crossSafe=performance.now()<crossSafeUntil || performance.now()<postMissionInvulTime;
  if(!freezeMission && !isBusInvincible() && !crossSafe){
    for(const c of cars){
      if(c.pushed)continue;
      if(aabbHit(pb,carBox(c))){
        hp-=T.CAR_DAMAGE;invul=55;A.hit();flash(239,68,68,0.5);shake(6);breakCombo();
        if(hp<=0){hp=0;updateHP();doGameOver();return;}
        updateHP();break;
      }
    }
  }
  if(invul>0)invul-=dt;

  if(!boostActive && !freezeMission){
    hp-=T.HP_DRAIN_PER_SEC*dt/60;
    if(hp > 0 && hp < 10 && frame % 120 === 0) A.hit();
    if(hp<=0){hp=0;updateHP();doGameOver();return;}
    updateHP();
  }

  particles.forEach(pt=>{pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=0.3*dt;pt.life-=dt;});
  particles=particles.filter(pt=>pt.life>0);
  floatTexts.forEach(ft=>{ft.y+=ft.vy*dt;ft.life-=dt;});
  floatTexts=floatTexts.filter(ft=>ft.life>0);
  if(!freezeMission && frame%30===0)setScore(score+1);
}

function drawPixelButton(cx,y,w,h,label,sub,fill='#fb923c'){
  ctx.save();
  const x=cx-w/2;
  ctx.fillStyle='rgba(15,23,42,.20)';
  roundRect(x+4,y+4,w,h,13);ctx.fill();
  ctx.fillStyle=fill;
  roundRect(x,y,w,h,13);ctx.fill();
  ctx.strokeStyle='#0f172a';ctx.lineWidth=2.5;roundRect(x,y,w,h,13);ctx.stroke();
  ctx.fillStyle='#0f172a';ctx.textAlign='center';
  const isBig = h >= 55;
  const labelSize = isBig ? 22 : 16;
  const subSize = isBig ? 10 : 8;
  const labelY = isBig ? y+h/2+1 : y+23;
  const subY = isBig ? y+h/2+22 : y+39;
  ctx.font=`900 ${labelSize}px "Noto Sans KR",sans-serif`;
  ctx.fillText(label,cx,labelY);
  if(sub){
    ctx.font=`bold 700 ${subSize}px "Press Start 2P",monospace`;
    ctx.fillText(sub,cx,subY);
  }
  ctx.restore();ctx.textAlign='left';
}

function showActionCue(title, sub='', color='#fbbf24', freezeMs=90, tag=''){
  const el=document.getElementById('memeCut');
  if(!el)return;

  const now=performance.now();
  const key=title+'|'+sub;
  if(key===lastActionCueKey && now-lastActionCueAt<1500)return;

  lastActionCueKey=key;
  lastActionCueAt=now;

  const firstTime=!seenActionCueKeys.has(key);
  seenActionCueKeys.add(key);

  if(firstTime && freezeMs>0){
    actionCueFreezeUntil=Math.max(actionCueFreezeUntil, now+Math.min(freezeMs+30,120));
  }

  const isMobileView = window.matchMedia('(max-width:700px), (pointer:coarse)').matches;

  el.innerHTML=`
    <div style="
      font-size:${isMobileView ? 15 : (firstTime ? 26 : 20)}px;
      line-height:1.05;
      font-weight:1000;
      color:#fff;
      letter-spacing:-0.05em;
      text-shadow:0 3px 6px rgba(0,0,0,.55);
    ">${title}</div>
    ${sub && !isMobileView ? `<div style="
      font-size:${firstTime ? 14 : 12}px;
      margin-top:6px;
      color:${color};
      font-weight:900;
      letter-spacing:.01em;
      text-shadow:0 2px 4px rgba(0,0,0,.4);
    ">${sub}</div>` : ''}
  `;

  el.style.top = isMobileView ? '7%' : '14%';
  el.style.color='#fff';
  el.style.background='rgba(15,23,42,.92)';
  el.style.textAlign='center';

  el.style.borderRadius='14px';

function showPolicyBanner(tag,title,sub,color){
  const now=performance.now();
  const key=String(title||'');
  const cueMap=[
    [/지반|싱크홀|위험구간/, ['지반 확인','위험 신호 확인']],
    [/횡단보도|보행/, ['안전 통과','보행 안전 큐']],
    [/성공버스|전용노선/, ['성공버스','착착 주행']],
    [/흡연부스|연기/, ['보행길 정리','연기 구간 정리']],
    [/쉼터/, ['쉼터 회복','체력 회복']],
    [/빗물|빗길|펌프|열선/, ['도로 관리','도로 상태 개선']],
    [/안심귀가|야간/, ['귀갓길 안심','밤길 안전 큐']],
  ];
  let cue=[title||'CHECK', sub||''];
  for(const [rx,val] of cueMap){ if(rx.test(key+' '+tag+' '+sub)){ cue=val; break; } }
  const important=/지반|횡단보도|성공버스|야간/.test(key+' '+tag);
  if(!important && now < policyBannerCooldownUntil) return;
  if(!important && key===lastPolicyBannerTitle && now < policyBannerCooldownUntil+900) return;
  policyBannerCooldownUntil=now+(important?520:1200);
  lastPolicyBannerTitle=key;
  showActionCue(cue[0], cue[1], color||'#fbbf24', important?50:0);
}

function updateTrafficLight(dt){
  if(!trafficLight) return;

  if(boostActive || busMode){
    trafficLight.consumed = true;
    trafficLight = null;
    addFloatText(P.x + 82, P.y - 70, '전용노선 통과', '#0ea5e9');
    return;
  }

  const tl = trafficLight;

  if(!tl.consumed){
    tl.x -= spd() * dt;

    if(!tl.warned && tl.x < W + 20){
      tl.warned = true;
      showPolicyBanner('추진 사례','스마트 횡단보도','보행 신호 타이밍 미션','#ffffff');
      flash(251,191,36,0.18);
    }

    if(P.x > tl.x - 20 && P.x < tl.x + 110){
      startRedMission(tl);
      return;
    }
  } else {
    // 통과 처리 후에도 1.2초간 초록불/흰 빔/안전통과 라벨이 보이도록 유지
    tl.x -= spd() * dt;
    if(performance.now() - tl.greenStartedAt > 1200 || tl.x < -90){
      trafficLight = null;
    }
  }
}

function drawHeatedRoadEffect(){
  const heatActive = performance.now() < heatRoadUntil;
  const hasRainZone = rainZones.some(z => !z.cleaned);
  if(!heatActive && !hasRainZone) return;
  
  ctx.save();
  
  // === 눈 입자 ===
  if(hasRainZone){
    rainZones.forEach(z=>{
      if(z.cleaned) return;
      const px=z.x, pw=z.width;
      
      // 핵심 수정: 활성화되면 시간이 지날수록 0으로 향함
      // 열선 지속시간 3200ms 기준, 0~1초: 100% → 50%, 1초~2.5초: 50% → 0%
      let meltProgress = 1;
      if(heatActive){
        const heatStarted = performance.now() - (heatRoadUntil - 3200);
        // heatStarted가 0이면 활성화 직후 (눈 100%)
        // heatStarted가 2500 이상이면 거의 사라짐
        meltProgress = Math.max(0, 1 - heatStarted/2500);
      }
      
      // 떨어지는 눈송이
      for(let i=0; i<28; i++){
        const sx = px + ((i*23 + frame*0.8) % pw);
        const sy = ROAD_TOP + 5 + ((i*17 + frame*1.5) % (ROAD_BOT-ROAD_TOP-15));
        const drift = Math.sin(frame*.04 + i)*3;
        const size = (2.2 + (i%3)*0.7) * meltProgress;
        if(size < 0.3) continue;
        
        // 큰 흰 원 (눈송이)
        ctx.fillStyle=`rgba(255,255,255,${0.95*meltProgress})`;
        ctx.beginPath();
        ctx.arc(sx+drift, sy, size, 0, Math.PI*2);
        ctx.fill();
        
        // 외곽 푸른빛 (시안 톤)
        if(size > 1.2){
          ctx.fillStyle=`rgba(186,230,253,${0.5*meltProgress})`;
          ctx.beginPath();
          ctx.arc(sx+drift, sy, size+1.2, 0, Math.PI*2);
          ctx.fill();
        }
      }
      
      // 도로 바닥에 쌓인 눈
      ctx.fillStyle=`rgba(255,255,255,${0.7*meltProgress})`;
      ctx.fillRect(px, ROAD_BOT-7, pw, 5*meltProgress);
      // 눈 표면 광택
      ctx.fillStyle=`rgba(186,230,253,${0.5*meltProgress})`;
      ctx.fillRect(px, ROAD_BOT-7, pw, 1.5*meltProgress);
    });
  }
  
  // === 열선 활성 시 김 ===
  if(heatActive){
    const remain=(heatRoadUntil-performance.now())/1000;
    const heatStarted = performance.now() - (heatRoadUntil - 3200);
    const pulse=0.86+0.14*Math.sin(frame*.22);
    
    // 도로 따뜻한 톤 (점점 진해짐)
    const warmth = Math.min(1, heatStarted/1000);
    ctx.globalCompositeOperation='screen';
    ctx.fillStyle=`rgba(245,158,11,${0.15*pulse*warmth})`;
    ctx.fillRect(0,ROAD_TOP+6,W,ROAD_BOT-ROAD_TOP-12);
    
    // 열선 라인
    for(let i=0;i<6;i++){
      const x=30+i*120-((scroll*1.2)%120);
      ctx.fillStyle=`rgba(251,191,36,${0.6*pulse*warmth})`;
      ctx.fillRect(x,ROAD_TOP+14,5,ROAD_BOT-ROAD_TOP-28);
    }
    ctx.globalCompositeOperation='source-over';
    
    // 김 (눈이 녹을수록 더 활발)
    const steamIntensity = Math.min(1.5, heatStarted/600);
    rainZones.forEach(z=>{
      if(z.cleaned) return;
      const px=z.x, pw=z.width;
      for(let i=0; i<10; i++){
        const sx = px + 15 + i*(pw/10);
        const rise = (frame*1.1 + i*13) % 60;
        const drift = Math.sin(frame*.05+i)*7;
        const alpha = Math.max(0, (0.65 - rise/60)) * steamIntensity;
        const size = 6 + rise*0.18;
        ctx.fillStyle=`rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.ellipse(sx+drift, ROAD_BOT-8-rise, size*1.6, size, 0, 0, Math.PI*2);
        ctx.fill();
      }
    });
    
    // 상단 칩
    drawSideStatusChip('열선 도로', remain.toFixed(1)+'S', '#f59e0b', boostActive ? 1 : 0);
  }
  
  ctx.restore();
}

function checkTutorialTriggers(){
  if(tutorialActive)return;
  if(phase!=='playing')return;
  if(mission&&mission.active)return;
  if(sinkholeMission&&sinkholeMission.active)return;
  if(boostActive||busMode)return;
  if(!TUTORIAL_SEEN.has('car') && cars.some(c=>c.x<W && c.x>P.x-120)){
    showTutorial('car'); return;
  }
  if(!TUTORIAL_SEEN.has('smoke') && smokes.some(z=>!z.cleaned && z.x<W+60 && z.x>P.x-200)){
    showTutorial('smoke'); return;
  }
  if(!TUTORIAL_SEEN.has('sinkhole') && sinkholes.some(s=>!s.consumed && s.x<W+60)){
    showTutorial('sinkhole'); return;
  }
  if(!TUTORIAL_SEEN.has('rain') && rainZones.some(z=>!z.cleaned && z.x<W+60)){
    showTutorial('rain'); return;
  }
  if(!TUTORIAL_SEEN.has('cross') && trafficLight && !trafficLight.consumed && trafficLight.x<W+60){
    showTutorial('cross'); return;
  }
  if(!TUTORIAL_SEEN.has('bus_stop') && busStops.some(b=>!b.collected && b.x<W+60)){
    showTutorial('bus_stop'); return;
  }
}

function showTutorial(type){
  if(TUTORIAL_SEEN.has(type))return;
  TUTORIAL_SEEN.add(type);
  tutorialActive=true;
  tutorialType=type;
  tutorialResumeAt=performance.now()+3500;
}

function dismissTutorial(){
  if(!tutorialActive)return;
  tutorialActive=false;
  tutorialType=null;
}

function endMission(){
  if(!mission)return;
  const now=performance.now();
  if(mission.type==='red'){
    const j=mission.judgement||'FAIL';
    let points=0,boost=0;
    if(j==='PERFECT'){points=8;boost=24;A.chainComplete();flash(251,191,36,0.45);shake(7);}
    else if(j==='GOOD'){points=4;boost=14;A.pickup(combo||1);flash(34,197,94,0.34);shake(4);}
    else if(j==='OK'){points=1;boost=6;A.pickup(combo||1);flash(59,130,246,0.26);shake(2);}
    else{hp=Math.max(0,hp-RED_FAIL_HP_PENALTY);A.hit();flash(239,68,68,0.35);}
    mission.bonusScore=points;
    if(points>0){
      setScore(score+points);addBoost(boost);
      crossSafeUntil=now+1600;invul=Math.max(invul,90);
      addFloatText(P.x,P.y-64,j+' +'+points,j==='PERFECT'?'#fbbf24':j==='GOOD'?'#22c55e':'#3b82f6');
      addFloatText(P.x,P.y-44,'안전 통과!','#fbbf24');
      if(dayNightPhase==='night'&&!ddnAppActive){ddnAppActive=true;showPolicyBanner('추진 사례','스마트 횡단보도','보행안전 개선 사례','#ffffff');flash(251,191,36,0.55);shake(3);A.chainComplete();}
    }else addFloatText(P.x,P.y-64,'신호 놓침','#ef4444');
    updateHP();
    if(hp<=0){hp=0;updateHP();doGameOver();return;}
    if(mission.lightRef){mission.lightRef.judged=true;mission.lightRef.grade=j;mission.lightRef.consumed=true;}
    trafficLight=null;trafficCooldown=Math.max(trafficCooldown,260);
  }else if(mission.type==='shelter'){
    const j=mission.judgement||'MISS';
    let heal=0,points=0;
    if(j==='PERFECT'){heal=100;points=7;smartShelterSlowUntil=now+GAME_TUNING.SMART_SHELTER_SLOW_MS;invul=Math.max(invul,36);A.chainComplete();flash(251,191,36,0.45);shake(5);}
    else if(j==='GOOD'){heal=30;points=3;smartShelterSlowUntil=now+2200;invul=Math.max(invul,36);A.pickup(combo||1);flash(56,189,248,0.32);shake(3);}
    else{hp=Math.max(0,hp-8);A.hit();flash(148,163,184,0.25);}
    if(heal>0)hp=Math.min(100,hp+heal);
    if(points>0){setScore(score+points);addBoost(j==='PERFECT'?24:12);}
    mission.bonusScore=points;mission.healAmount=heal;
    if(mission.shelterRef){mission.shelterRef.consumed=true;mission.shelterRef.timingStarted=true;}
    if(j==='PERFECT'){addFloatText(P.x,P.y-62,'온열의자 PERFECT!','#fbbf24');addFloatText(P.x,P.y-42,'HP FULL','#06b6d4');}
    else if(j==='GOOD')addFloatText(P.x,P.y-62,'쾌적 회복 +30','#22c55e');
    else addFloatText(P.x,P.y-62,'타이밍 MISS -8','#94a3b8');
    updateHP();
    if(hp<=0){hp=0;updateHP();doGameOver();return;}
  }
  const endedType=mission.type;
  const endedJudgement=mission.judgement||(mission.type==='red'?'FAIL':'MISS');
  mission={...mission,active:false,gradeTimer:42};
  if(endedType==='shelter'){
    if(endedJudgement==='PERFECT'||endedJudgement==='GOOD'){postMissionInvulTime=now+600;invul=Math.max(invul,36);}
    else{postMissionInvulTime=now+250;invul=Math.max(invul,18);}
  }else{postMissionInvulTime=now+900;invul=Math.max(invul,54);}
}

function judgeShelterTiming(){if(mission&&mission.active&&mission.type==='shelter')endMission();}

let txtState=null;
function startTextEvent(){
  if(textEventActive)return;
  textEventActive=true;
  const scen=TEXT_SCENARIOS[Math.floor(Math.random()*TEXT_SCENARIOS.length)];
  txtState={scen,finished:false};
  document.getElementById('txtFrom').textContent=scen.from;
  document.getElementById('txtSub').textContent=scen.sub;
  document.getElementById('txtChat').innerHTML='';
  document.getElementById('txtReplies').innerHTML='';
  document.getElementById('txtModal').classList.add('show');
  scen.msgs.forEach(function(m,i){
    setTimeout(function(){
      const chat=document.getElementById('txtChat');if(!chat)return;
      const row=document.createElement('div');row.className='bubble-row them';
      row.innerHTML='<div class="bubble">'+m+'</div>';chat.appendChild(row);chat.scrollTop=chat.scrollHeight;
    },400+i*900);
  });
  setTimeout(function(){
    const wrap=document.getElementById('txtReplies');if(!wrap)return;
    wrap.innerHTML='';
    scen.options.forEach(function(opt,i){
      const btn=document.createElement('button');btn.className='reply-btn';btn.textContent=opt.text;
      btn.onclick=function(){handleReply(i,btn);};wrap.appendChild(btn);
    });
  },400+scen.msgs.length*900);
}
function handleReply(idx,btn){
  if(!txtState||txtState.finished)return;txtState.finished=true;
  const opt=txtState.scen.options[idx];
  const chat=document.getElementById('txtChat');
  const row=document.createElement('div');row.className='bubble-row me';
  row.innerHTML='<div class="bubble">'+opt.reply+'</div>';chat.appendChild(row);chat.scrollTop=chat.scrollHeight;
  if(opt.correct){
    btn.classList.add('correct');setScore(score+200);addBoost(40);
    showMeme('적극 대응 +200','#22c55e','#0f172a');A.chainComplete();
  }else{
    btn.classList.add('wrong');setScore(score+50);addBoost(10);
    showMeme('한 걸음 더 +50','#fb923c','#fff');
  }
  document.querySelectorAll('.reply-btn').forEach(function(b){if(b!==btn)b.disabled=true;});
  setTimeout(function(){
    document.getElementById('txtModal').classList.remove('show');
    textEventActive=false;txtState=null;

    invul=Math.max(invul,90);
    postMissionInvulTime=performance.now()+1500;
  },1400);
}
